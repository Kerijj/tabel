<!DOCTYPE html>
<html class="light" lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Ассистент: Задачи и Табель</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7b5455",
                        "primary-container": "#f4c2c2",
                        "on-primary-container": "#734e4e",
                        "surface": "#faf9f9",
                        "surface-container-low": "#f5f3f3",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#d4c2c2"
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { background-color: #f4c2c2 !important; color: #1b1c1c !important; font-weight: 800; }
    </style>
</head>
<body class="bg-surface text-[#1B1C1C] min-h-screen pb-32 dark:bg-[#0d0e0e] dark:text-[#e4e6e6]">

<audio id="alarm-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<header class="fixed top-0 w-full z-50 bg-[#FAF9F9]/80 backdrop-blur-xl dark:bg-[#0d0e0e]/80 flex items-center justify-between px-6 py-4 shadow-sm border-b border-outline-variant/10">
    <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-primary">schedule</span>
        <h1 class="text-lg font-bold tracking-tight">Ассистент</h1>
    </div>
    <button onclick="document.documentElement.classList.toggle('dark')" class="w-10 h-10 rounded-xl bg-surface-container-low dark:bg-zinc-800 flex items-center justify-center">
        <span class="material-symbols-outlined">dark_mode</span>
    </button>
</header>

<main class="pt-24 px-6 max-w-2xl mx-auto space-y-6">

    <section id="timesheet-section" class="hidden space-y-4">
        <div class="bg-white dark:bg-zinc-900 p-6 rounded-2xl border border-outline-variant/30">
            <h3 class="text-xl font-bold mb-4">Загрузить смену</h3>
            <textarea id="ts-input" class="w-full h-20 p-4 rounded-xl bg-surface-container-low dark:bg-zinc-800 border-none text-sm mb-4" placeholder="Вставьте строку из табеля (день и время)..."></textarea>
            <button onclick="processTimesheet()" class="w-full py-4 bg-primary text-white rounded-2xl font-bold active:scale-95 transition-all">Добавить в график</button>
        </div>

        <div class="flex items-center justify-between px-2">
            <h3 class="font-bold uppercase text-[10px] tracking-widest text-secondary">Мой текущий график</h3>
            <button onclick="clearSchedule()" class="text-[10px] font-bold text-primary">ОЧИСТИТЬ</button>
        </div>
        
        <div id="schedule-list" class="space-y-3"></div>
    </section>

    <section id="notes-section" class="space-y-6">
        <div class="bg-surface-container-lowest dark:bg-zinc-900 p-6 rounded-2xl shadow-sm border border-outline-variant/20">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">Заметки и Задачи</h3>
                <span class="material-symbols-outlined text-primary">edit_note</span>
            </div>
            <textarea id="notes-area" class="w-full h-80 bg-transparent border-none text-secondary dark:text-zinc-400 leading-relaxed resize-none p-0" placeholder="Что нужно сделать сегодня?"></textarea>
        </div>

        <div class="bg-gradient-to-br from-primary to-[#a37c7d] p-6 rounded-2xl text-white shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <h4 class="font-bold">Инфо-панель</h4>
                <span id="alarm-indicator" class="material-symbols-outlined animate-pulse hidden text-white">notifications_active</span>
            </div>
            <div class="bg-white/10 p-4 rounded-xl mb-4">
                <p id="daily-fact" class="text-sm italic">Загружаю факт...</p>
            </div>
            <div class="text-[10px] font-bold uppercase tracking-widest bg-black/20 w-fit px-3 py-1 rounded-md" id="status-text">
                Будильник не установлен
            </div>
        </div>
    </section>

</main>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-8 pt-4 bg-[#FAF9F9]/95 backdrop-blur-xl dark:bg-[#0d0e0e]/95 z-50 rounded-t-3xl shadow-2xl">
    <button id="nav-notes" onclick="showSection('notes')" class="flex flex-col items-center gap-1 p-3 rounded-2xl transition-all active-tab">
        <span class="material-symbols-outlined">assignment</span>
        <span class="text-[9px] font-bold uppercase tracking-tighter">Заметки</span>
    </button>
    <button id="nav-ts" onclick="showSection('timesheet')" class="flex flex-col items-center gap-1 p-3 rounded-2xl transition-all text-secondary">
        <span class="material-symbols-outlined">calendar_month</span>
        <span class="text-[9px] font-bold uppercase tracking-tighter">График</span>
    </button>
</nav>

<script>
    // --- ДАННЫЕ И ХРАНЕНИЕ ---
    let appData = JSON.parse(localStorage.getItem('my_productivity_app')) || {
        notes: "",
        schedule: [] // Массив объектов { day: '', end: '' }
    };

    function save() {
        localStorage.setItem('my_productivity_app', JSON.stringify(appData));
        renderSchedule();
    }

    // --- ПЕРЕКЛЮЧЕНИЕ СЕКЦИЙ ---
    function showSection(name) {
        document.getElementById('notes-section').classList.toggle('hidden', name !== 'notes');
        document.getElementById('timesheet-section').classList.toggle('hidden', name !== 'timesheet');
        
        document.getElementById('nav-notes').classList.toggle('active-tab', name === 'notes');
        document.getElementById('nav-ts').classList.toggle('active-tab', name === 'timesheet');
    }

    // --- ЗАМЕТКИ ---
    const notesEl = document.getElementById('notes-area');
    notesEl.value = appData.notes;
    notesEl.addEventListener('input', (e) => {
        appData.notes = e.target.value;
        save();
    });

    // --- ТАБЕЛЬ (ГРАФИК) ---
    const hebrewToRussian = {
        'יום ראשון': 'Воскресенье', 'יום שני': 'Понедельник', 'יום שלישי': 'Вторник',
        'יום רביעי': 'Среда', 'יום חמישי': 'Четверг', 'יום שישי': 'Пятница', 'יום שבת': 'Суббота'
    };

    function processTimesheet() {
        const input = document.getElementById('ts-input').value;
        const times = input.match(/\d{2}:\d{2}/g);
        
        if (times && times.length > 0) {
            let dayName = "Смена";
            for (let [he, ru] of Object.entries(hebrewToRussian)) {
                if (input.includes(he)) { dayName = ru; break; }
            }
            
            const endTime = times.sort().reverse()[0]; // Берем самое позднее время как время ухода
            appData.schedule.push({ day: dayName, end: endTime, id: Date.now() });
            document.getElementById('ts-input').value = '';
            save();
            showSection('notes');
        } else {
            alert("Пожалуйста, вставь строку с временем в формате 00:00");
        }
    }

    function renderSchedule() {
        const list = document.getElementById('schedule-list');
        list.innerHTML = '';
        
        appData.schedule.forEach(item => {
            const card = document.createElement('div');
            card.className = "bg-white dark:bg-zinc-900 p-4 rounded-xl flex justify-between items-center shadow-sm border-l-4 border-primary";
            card.innerHTML = `
                <div>
                    <div class="text-xs font-bold text-primary uppercase">${item.day}</div>
                    <div class="text-lg font-black">До ${item.end}</div>
                </div>
                <button onclick="deleteItem(${item.id})" class="text-zinc-300 hover:text-red-500 transition-colors">
                    <span class="material-symbols-outlined">delete</span>
                </button>
            `;
            list.appendChild(card);
        });
        checkTodayAlarm();
    }

    function deleteItem(id) {
        appData.schedule = appData.schedule.filter(i => i.id !== id);
        save();
    }

    function clearSchedule() {
        if (confirm("Очистить весь график?")) {
            appData.schedule = [];
            save();
        }
    }

    // --- БУДИЛЬНИК ---
    function checkTodayAlarm() {
        const statusText = document.getElementById('status-text');
        const indicator = document.getElementById('alarm-indicator');
        
        // Для простоты считаем, что первая смена в списке — на сегодня
        if (appData.schedule.length > 0) {
            const lastShift = appData.schedule[appData.schedule.length - 1];
            statusText.innerText = `СИГНАЛ БУДЕТ ЗА 5 МИНУТ ДО ${lastShift.end}`;
            indicator.classList.remove('hidden');
        } else {
            statusText.innerText = `Будильник не установлен`;
            indicator.classList.add('hidden');
        }
    }

    setInterval(() => {
        if (appData.schedule.length === 0) return;
        
        const now = new Date();
        const currentStr = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
        
        appData.schedule.forEach(shift => {
            const [h, m] = shift.end.split(':').map(Number);
            let alarmM = m - 5;
            let alarmH = h;
            if (alarmM < 0) { alarmM += 60; alarmH -= 1; }
            const alarmStr = `${alarmH}:${alarmM.toString().padStart(2, '0')}`;

            if (currentStr === alarmStr) {
                document.getElementById('alarm-sound').play();
                alert(`Внимание! Через 5 минут окончание работы (${shift.end})!`);
            }
        });
    }, 30000);

    // --- ФАКТЫ ---
    const facts = [
        "Твой мозг — самый мощный компьютер в мире.",
        "Пчелы умеют считать до четырех.",
        "Шоколад делает людей капельку счастливее.",
        "Осьминоги могут менять цвет за доли секунды.",
        "Мед — это единственный продукт, который хранится вечно.",
        "Если ты улыбаешься, твое настроение реально улучшается."
    ];
    document.getElementById('daily-fact').innerText = "Знаете ли вы? " + facts[Math.floor(Math.random() * facts.length)];

    // Инициализация
    renderSchedule();
</script>

</body>
</html>
