<!DOCTYPE html>
<html class="light" lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Productivity Pro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Библиотека для распознавания текста с фото -->
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7b5455",
                        "primary-fixed-dim": "#ecbaba",
                        "surface": "#faf9f9",
                        "surface-dark": "#0d0e0e",
                        "surface-container": "#f5f3f3",
                        "surface-container-dark": "#181a1a",
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; }
        .hidden-section { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-nav { background-color: #ecbaba !important; color: #1b1c1c !important; border-radius: 12px; }
        .active-day { background-color: #7b5455 !important; color: white !important; transform: scale(1.1); }
        .editorial-gradient { background: linear-gradient(135deg, #7B5455 0%, #F4C2C2 100%); }
    </style>
</head>
<body class="bg-surface dark:bg-surface-dark text-slate-900 dark:text-gray-100 transition-colors duration-300">

<audio id="alarm-audio" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<!-- AppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-surface-dark/80 backdrop-blur-xl border-b dark:border-white/5">
    <div class="flex items-center justify-between px-6 py-4">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim">schedule</span>
            <h1 id="header-title" class="text-lg font-bold tracking-tight">ГЛАВНАЯ</h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="material-symbols-outlined opacity-60">contrast</button>
            <div id="top-clock" class="font-mono font-bold text-primary dark:text-primary-fixed-dim">00:00</div>
        </div>
    </div>
</header>

<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto min-h-screen">

    <!-- HOME SECTION -->
    <div id="section-home" class="space-y-6">
        <section class="relative overflow-hidden rounded-3xl bg-surface-container dark:bg-surface-container-dark p-8 shadow-sm">
            <div class="relative z-10 space-y-4">
                <p id="home-date" class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-50">Загрузка...</p>
                <h2 id="home-clock" class="text-7xl font-black tracking-tighter">00:00</h2>
                <div class="flex justify-between items-end border-t dark:border-white/10 pt-4">
                    <div>
                        <p class="text-[10px] font-bold uppercase opacity-40">Часы сегодня</p>
                        <p id="home-hours" class="text-2xl font-black text-primary dark:text-primary-fixed-dim">0.0</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-bold uppercase opacity-40">Выход (Alarm)</p>
                        <p id="home-alarm" class="text-xl font-bold">--:--</p>
                    </div>
                </div>
            </div>
            <div class="absolute -right-20 -top-20 w-64 h-64 editorial-gradient opacity-10 rounded-full blur-3xl"></div>
        </section>

        <section id="fact-card" class="bg-primary/5 dark:bg-white/5 p-6 rounded-3xl border border-primary/10">
            <p id="fact-display" class="text-sm italic opacity-70">Загрузка факта...</p>
        </section>
    </div>

    <!-- TIMESHEET SECTION -->
    <div id="section-timesheet" class="hidden-section space-y-6">
        <div class="bg-surface-container dark:bg-surface-container-dark p-6 rounded-3xl space-y-6">
            <div class="flex flex-col gap-4">
                <h3 class="font-bold text-sm opacity-50 uppercase tracking-widest text-center">Ввод рабочих смен</h3>
                
                <!-- OCR Upload -->
                <div class="relative">
                    <input type="file" id="ocr-upload" accept="image/*" class="hidden" onchange="processImage(this)">
                    <button onclick="document.getElementById('ocr-upload').click()" class="w-full py-4 border-2 border-dashed border-primary/30 rounded-2xl text-primary font-bold text-xs flex items-center justify-center gap-2 hover:bg-primary/5">
                        <span class="material-symbols-outlined">add_a_photo</span>
                        РАСПОЗНАТЬ ЧАСЫ С ФОТО
                    </button>
                    <div id="ocr-loader" class="hidden absolute inset-0 bg-white/80 dark:bg-black/80 flex items-center justify-center rounded-2xl">
                        <span class="text-xs font-bold animate-pulse">Обработка фото...</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <p class="text-[9px] font-bold opacity-40 text-center">СМЕНА 1 (ВХОД / ВЫХОД)</p>
                        <input type="time" id="ts-s1" onchange="sync()" class="w-full bg-white dark:bg-surface-dark border-none rounded-xl">
                        <input type="time" id="ts-e1" onchange="sync()" class="w-full bg-white dark:bg-surface-dark border-none rounded-xl">
                    </div>
                    <div class="space-y-2">
                        <p class="text-[9px] font-bold opacity-40 text-center">СМЕНА 2 (ВХОД / ВЫХОД)</p>
                        <input type="time" id="ts-s2" onchange="sync()" class="w-full bg-white dark:bg-surface-dark border-none rounded-xl">
                        <input type="time" id="ts-e2" onchange="sync()" class="w-full bg-white dark:bg-surface-dark border-none rounded-xl">
                    </div>
                </div>

                <div class="bg-primary text-white p-6 rounded-2xl text-center shadow-lg shadow-primary/20">
                    <p class="text-[10px] font-bold opacity-60 uppercase mb-1">Итого отработано</p>
                    <p id="ts-total" class="text-4xl font-black">0.0 ч</p>
                </div>
            </div>
        </div>
    </div>

    <!-- TASKS SECTION -->
    <div id="section-tasks" class="hidden-section space-y-6">
        <div id="calendar-strip" class="flex gap-3 overflow-x-auto no-scrollbar py-2"></div>
        <div class="flex gap-2">
            <input type="text" id="task-input" placeholder="Добавить задачу..." class="flex-1 rounded-2xl border-none bg-surface-container dark:bg-surface-container-dark p-4 focus:ring-primary">
            <button onclick="addTask()" class="bg-primary text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg active:scale-90">
                <span class="material-symbols-outlined">add</span>
            </button>
        </div>
        <ul id="task-list" class="space-y-3"></ul>
    </div>

    <!-- NOTES SECTION -->
    <div id="section-notes" class="hidden-section">
        <textarea id="notes-area" oninput="sync()" placeholder="Ваши идеи здесь..." class="w-full h-[60vh] rounded-3xl border-none bg-surface-container dark:bg-surface-container-dark p-6 focus:ring-primary leading-relaxed"></textarea>
    </div>

</main>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 left-0 w-full h-20 bg-white/90 dark:bg-surface-dark/90 backdrop-blur-xl flex justify-around items-center px-4 border-t dark:border-white/5 z-50">
    <button onclick="showSection('home')" id="nav-home" class="flex flex-col items-center p-3 opacity-40 transition-all">
        <span class="material-symbols-outlined">home</span>
        <span class="text-[9px] font-bold uppercase mt-1">Главная</span>
    </button>
    <button onclick="showSection('timesheet')" id="nav-timesheet" class="flex flex-col items-center p-3 opacity-40 transition-all">
        <span class="material-symbols-outlined">timer</span>
        <span class="text-[9px] font-bold uppercase mt-1">Табель</span>
    </button>
    <button onclick="showSection('tasks')" id="nav-tasks" class="flex flex-col items-center p-3 opacity-40 transition-all">
        <span class="material-symbols-outlined">checklist</span>
        <span class="text-[9px] font-bold uppercase mt-1">Задачи</span>
    </button>
    <button onclick="showSection('notes')" id="nav-notes" class="flex flex-col items-center p-3 opacity-40 transition-all">
        <span class="material-symbols-outlined">description</span>
        <span class="text-[9px] font-bold uppercase mt-1">Заметки</span>
    </button>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('user_prod_db')) || {};
    let selectedDate = new Date().toISOString().split('T')[0];
    const audio = document.getElementById('alarm-audio');

    // 1. НАВИГАЦИЯ
    function showSection(id) {
        document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden-section'));
        const target = document.getElementById('section-' + id);
        if(target) target.classList.remove('hidden-section');
        
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-nav', 'opacity-100'));
        document.getElementById('nav-' + id).classList.add('active-nav', 'opacity-100');
        
        document.getElementById('header-title').innerText = id.toUpperCase();
        if(id === 'tasks') renderCalendar();
        loadDayData();
    }

    // 2. OCR - РАСПОЗНАВАНИЕ ФОТО
    async function processImage(input) {
        if (!input.files || !input.files[0]) return;
        const loader = document.getElementById('ocr-loader');
        loader.classList.remove('hidden');
        
        try {
            const result = await Tesseract.recognize(input.files[0], 'eng+rus');
            const text = result.data.text;
            
            // Ищем время формата 00:00 или 0:00
            const timeRegex = /\b([0-2]?\d:[0-5]\d)\b/g;
            const matches = text.match(timeRegex);
            
            if (matches && matches.length >= 2) {
                document.getElementById('ts-s1').value = formatTime(matches[0]);
                document.getElementById('ts-e1').value = formatTime(matches[1]);
                if (matches.length >= 4) {
                    document.getElementById('ts-s2').value = formatTime(matches[2]);
                    document.getElementById('ts-e2').value = formatTime(matches[3]);
                }
                sync();
                alert("Время распознано и добавлено!");
            } else {
                alert("Не удалось четко распознать время. Попробуйте другое фото или введите вручную.");
            }
        } catch (e) {
            console.error(e);
            alert("Ошибка при обработке изображения.");
        } finally {
            loader.classList.add('hidden');
        }
    }

    function formatTime(t) {
        if(t.length === 4) return "0" + t;
        return t;
    }

    // 3. ТЕМА И ЧАСЫ
    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
    }

    function updateClock() {
        const now = new Date();
        const tStr = now.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
        if(document.getElementById('home-clock')) document.getElementById('home-clock').innerText = tStr;
        document.getElementById('top-clock').innerText = now.toLocaleTimeString('ru-RU');
        document.getElementById('home-date').innerText = now.toLocaleDateString('ru-RU', {weekday:'long', day:'numeric', month:'long'});

        // Будильник
        if(now.getSeconds() === 0) checkAlarms(now);
    }

    function checkAlarms(now) {
        const today = now.toISOString().split('T')[0];
        const data = db[today];
        if(!data) return;
        
        const cur = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        const trigger = (target) => {
            if(!target) return;
            const [h, m] = target.split(':');
            const targetMin = parseInt(h)*60 + parseInt(m) - 5;
            const th = Math.floor(targetMin/60).toString().padStart(2,'0');
            const tm = (targetMin%60).toString().padStart(2,'0');
            if(cur === `${th}:${tm}`) {
                audio.play();
                alert("🔔 5 минут до конца смены!");
            }
        };
        trigger(data.e1); trigger(data.e2);
    }

    // 4. ДАННЫЕ
    function sync() {
        if(!db[selectedDate]) db[selectedDate] = { tasks: [], notes: '', s1:'', e1:'', s2:'', e2:'' };
        let d = db[selectedDate];
        d.s1 = document.getElementById('ts-s1').value;
        d.e1 = document.getElementById('ts-e1').value;
        d.s2 = document.getElementById('ts-s2').value;
        d.e2 = document.getElementById('ts-e2').value;
        d.notes = document.getElementById('notes-area').value;
        localStorage.setItem('user_prod_db', JSON.stringify(db));
        loadDayData();
    }

    function loadDayData() {
        const d = db[selectedDate] || { s1:'', e1:'', s2:'', e2:'', tasks: [], notes: '' };
        if(document.getElementById('ts-s1')) {
            document.getElementById('ts-s1').value = d.s1 || '';
            document.getElementById('ts-e1').value = d.e1 || '';
            document.getElementById('ts-s2').value = d.s2 || '';
            document.getElementById('ts-e2').value = d.e2 || '';
            document.getElementById('notes-area').value = d.notes || '';
        }
        
        const getM = (t) => t ? parseInt(t.split(':')[0])*60 + parseInt(t.split(':')[1]) : 0;
        let total = 0;
        if(d.s1 && d.e1) total += (getM(d.e1) - getM(d.s1));
        if(d.s2 && d.e2) total += (getM(d.e2) - getM(d.s2));
        
        const h = (total/60).toFixed(1);
        if(document.getElementById('ts-total')) document.getElementById('ts-total').innerText = h + ' ч';
        
        if(selectedDate === new Date().toISOString().split('T')[0]) {
            document.getElementById('home-hours').innerText = h;
            document.getElementById('home-alarm').innerText = d.e2 || d.e1 || '--:--';
        }
        renderTasks();
    }

    // 5. ЗАДАЧИ
    function renderCalendar() {
        const box = document.getElementById('calendar-strip');
        box.innerHTML = '';
        const today = new Date();
        for(let i = -3; i < 10; i++) {
            const d = new Date(); d.setDate(today.getDate() + i);
            const dStr = d.toISOString().split('T')[0];
            const btn = document.createElement('button');
            btn.className = `flex-shrink-0 w-12 py-4 rounded-2xl flex flex-col items-center bg-surface-container dark:bg-surface-container-dark transition-all ${dStr === selectedDate ? 'active-day shadow-lg' : 'opacity-40'}`;
            btn.innerHTML = `<span class="text-[8px] font-bold uppercase">${d.toLocaleDateString('ru-RU', {weekday:'short'})}</span><span class="text-sm font-black">${d.getDate()}</span>`;
            btn.onclick = () => { selectedDate = dStr; renderCalendar(); loadDayData(); };
            box.appendChild(btn);
        }
    }

    function addTask() {
        const input = document.getElementById('task-input');
        if(!input.value.trim()) return;
        if(!db[selectedDate]) db[selectedDate] = { tasks: [], notes: '', s1:'', e1:'', s2:'', e2:'' };
        db[selectedDate].tasks.push({ text: input.value, done: false });
        input.value = '';
        sync();
    }

    function renderTasks() {
        const list = document.getElementById('task-list');
        if(!list) return;
        list.innerHTML = '';
        const tasks = db[selectedDate]?.tasks || [];
        tasks.forEach((t, i) => {
            const li = document.createElement('li');
            li.className = "flex items-center justify-between p-4 bg-surface-container dark:bg-surface-container-dark rounded-2xl";
            li.innerHTML = `
                <div class="flex items-center gap-3">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${i})" class="w-5 h-5 rounded-full border-primary text-primary focus:ring-0 bg-transparent">
                    <span class="text-sm ${t.done ? 'line-through opacity-40' : ''}">${t.text}</span>
                </div>
                <button onclick="deleteTask(${i})" class="material-symbols-outlined text-sm opacity-20">delete</button>
            `;
            list.appendChild(li);
        });
    }

    function toggleTask(i) { db[selectedDate].tasks[i].done = !db[selectedDate].tasks[i].done; sync(); }
    function deleteTask(i) { db[selectedDate].tasks.splice(i,1); sync(); }

    const facts = ["Мозг потребляет 20% всей энергии организма.", "Пчелы умеют считать до четырех.", "Смех улучшает работу сердца.", "Чтение снижает стресс на 68%."];
    
    // СТАРТ
    window.onload = () => {
        showSection('home');
        setInterval(updateClock, 1000);
        document.getElementById('fact-display').innerText = facts[Math.floor(Math.random()*facts.length)];
    };
</script>
</body>
</html>
