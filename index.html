<!DOCTYPE html>
<html class="light" lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>WorkLife Pro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7b5455",
                        "primary-light": "#ecbaba",
                        "surface": "#faf9f9",
                        "surface-dark": "#0d0e0e",
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; }
        .hidden-section { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-nav { background-color: #ecbaba !important; color: #1b1c1c !important; border-radius: 20px; }
        .active-day { border: 2px solid #7b5455 !important; font-weight: 800; transform: scale(1.05); }
        .dot-day { background-color: #7b5455; }
        .dot-late { background-color: #ba1a1a; }
        body { transition: background 0.3s; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        canvas { touch-action: none; cursor: crosshair; }
    </style>
</head>
<body class="bg-surface dark:bg-surface-dark text-slate-900 dark:text-gray-100">

<audio id="alarm-audio" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto" loop></audio>

<!-- AppBar -->
<header class="fixed top-0 w-full z-40 bg-white/90 dark:bg-zinc-950/90 backdrop-blur-md border-b dark:border-white/5 px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary">edit_note</span>
        <h1 id="header-title" class="text-xs font-black uppercase tracking-widest text-primary">Главная</h1>
    </div>
    <div class="flex items-center gap-3">
        <button onclick="unlockAudio()" id="audio-btn" class="bg-primary text-white text-[9px] font-bold px-3 py-1.5 rounded-full shadow-lg">🔔 ЗВУК</button>
        <button onclick="toggleTheme()" class="material-symbols-outlined opacity-50">contrast</button>
        <div id="top-clock" class="font-mono font-bold text-[10px] text-primary">00:00:00</div>
    </div>
</header>

<!-- РИСОВАЛЬНЯ (MODAL) -->
<div id="canvas-modal" class="hidden fixed inset-0 z-[100] bg-black/90 flex flex-col">
    <div class="p-4 flex justify-between items-center text-white">
        <button onclick="closeCanvas()" class="font-bold text-sm uppercase">Отмена</button>
        <p class="font-black text-xs uppercase tracking-widest">Рукописный ввод</p>
        <button onclick="saveCanvas()" class="bg-primary px-4 py-2 rounded-full font-bold text-sm">Готово</button>
    </div>
    <div class="flex-1 bg-white m-4 rounded-3xl overflow-hidden relative">
        <canvas id="note-canvas" class="w-full h-full"></canvas>
    </div>
    <div class="p-6 flex justify-center gap-8 text-white">
        <button onclick="clearCanvas()" class="flex flex-col items-center opacity-60"><span class="material-symbols-outlined">delete</span><span class="text-[10px]">Очистить</span></button>
    </div>
</div>

<main class="pt-20 pb-36 px-6 max-w-2xl mx-auto space-y-8">

    <!-- HOME SECTION -->
    <div id="section-home" class="space-y-6">
        <section class="rounded-[2.5rem] bg-white dark:bg-zinc-900 p-8 shadow-xl border dark:border-white/5 relative overflow-hidden text-center">
            <p id="home-date" class="text-[10px] font-bold opacity-40 uppercase tracking-[0.2em] mb-2">Загрузка...</p>
            <h2 id="home-clock" class="text-6xl font-black tracking-tighter text-primary dark:text-primary-light mb-6">00:00</h2>
            <div class="grid grid-cols-2 gap-4 border-t dark:border-white/10 pt-6">
                <div><p class="text-[9px] font-bold opacity-40 uppercase">Сегодня</p><p id="home-hours" class="text-2xl font-black">0.0 ч</p></div>
                <div><p class="text-[9px] font-bold opacity-40 uppercase text-red-500">Сигнал</p><p id="home-alarm" class="text-xl font-bold text-primary">--:--</p></div>
            </div>
        </section>

        <section class="bg-white dark:bg-zinc-900 p-6 rounded-[2rem] shadow-sm border dark:border-white/5">
            <h3 class="text-[10px] font-black uppercase opacity-40 mb-4 text-center tracking-widest">Календарь (Вс-Сб)</h3>
            <div id="month-grid" class="grid grid-cols-7 gap-2 text-center"></div>
        </section>

        <div id="day-preview-card" class="hidden bg-white dark:bg-zinc-800 border-2 border-primary/20 p-6 rounded-[2.5rem] space-y-4 shadow-2xl">
            <div class="flex justify-between items-center"><h4 id="preview-date-title" class="font-black text-primary text-sm uppercase">--</h4><button onclick="clearDayData()" class="text-[9px] opacity-40 uppercase">Очистить</button></div>
            <div id="preview-shifts" class="grid grid-cols-2 gap-2 text-xs font-bold text-primary text-center"></div>
            <div id="preview-task-list" class="space-y-2 max-h-32 overflow-y-auto no-scrollbar"></div>
            <div class="flex gap-2">
                <input type="text" id="quick-task-input" placeholder="Добавить задачу..." class="flex-1 bg-primary/5 border-none rounded-xl text-xs p-3">
                <button onclick="addQuickTask()" class="bg-primary text-white px-4 rounded-xl">+</button>
            </div>
        </div>
    </div>

    <!-- TIMESHEET SECTION -->
    <div id="section-timesheet" class="hidden-section space-y-6">
        <div class="bg-white dark:bg-zinc-900 p-6 rounded-[2.5rem] shadow-lg border-2 border-primary/20 space-y-4">
            <div class="flex justify-between items-center mb-2">
                <input type="date" id="ts-date-picker" onchange="changeDate(this.value)" class="bg-primary/10 border-none rounded-xl font-bold text-primary text-sm">
                <span id="ts-total" class="text-xl font-black text-primary">0.0 ч</span>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="p-4 rounded-2xl border-2 border-primary bg-primary/5 text-center">
                    <p class="text-[9px] font-black text-primary uppercase mb-2">Смена 1</p>
                    <input type="time" id="ts-s1" onchange="saveData()" class="w-full bg-white dark:bg-zinc-800 rounded-xl p-2 mb-2 font-bold">
                    <input type="time" id="ts-e1" onchange="saveData()" class="w-full bg-white dark:bg-zinc-800 rounded-xl p-2 font-bold">
                </div>
                <div class="p-4 rounded-2xl border-2 border-primary bg-primary/5 text-center">
                    <p class="text-[9px] font-black text-primary uppercase mb-2">Смена 2</p>
                    <input type="time" id="ts-s2" onchange="saveData()" class="w-full bg-white dark:bg-zinc-800 rounded-xl p-2 mb-2 font-bold">
                    <input type="time" id="ts-e2" onchange="saveData()" class="w-full bg-white dark:bg-zinc-800 rounded-xl p-2 font-bold">
                </div>
            </div>

            <div class="space-y-2">
                <button onclick="applyWeekTemplate()" class="w-full py-4 bg-primary text-white rounded-3xl font-black text-xs uppercase shadow-lg">📅 Заполнить текущую неделю</button>
                <button onclick="toggleTemplateEditor()" class="w-full py-3 bg-primary/10 text-primary border-2 border-primary rounded-3xl font-black text-[10px] uppercase">⚙️ Настроить мой стандартный график</button>
            </div>
        </div>

        <!-- Редактор шаблона -->
        <div id="template-editor" class="hidden-section bg-white dark:bg-zinc-900 p-6 rounded-[2.5rem] border-2 border-dashed border-primary/30 space-y-4">
            <h4 class="font-black text-xs uppercase text-center opacity-60 italic">Настройка стандартов (Вс-Сб)</h4>
            <div id="template-list" class="space-y-2 max-h-80 overflow-y-auto pr-2 no-scrollbar"></div>
            <button onclick="toggleTemplateEditor()" class="w-full py-3 bg-zinc-100 dark:bg-zinc-800 rounded-2xl font-bold text-[10px] uppercase">Закрыть настройки</button>
        </div>
    </div>

    <!-- TASKS SECTION -->
    <div id="section-tasks" class="hidden-section space-y-6">
        <div id="calendar-strip" class="flex gap-3 overflow-x-auto no-scrollbar py-2 px-1"></div>
        <div class="bg-white dark:bg-zinc-900 p-6 rounded-[2.5rem] space-y-4 shadow-sm border dark:border-white/5">
            <input type="text" id="task-input" placeholder="Что нужно сделать?" class="w-full rounded-2xl border-none bg-surface dark:bg-zinc-800 p-4">
            <div class="flex items-center justify-between">
                <select id="task-priority" class="bg-primary/10 border-none rounded-xl text-xs font-bold text-primary p-2">
                    <option value="🚨 Срочно">🚨 Срочно</option>
                    <option value="⏳ Ждет">⏳ Ждет</option>
                    <option value="☕ Обычное">☕ Обычное</option>
                </select>
                <button onclick="addTask()" class="bg-primary text-white px-8 py-3 rounded-2xl font-bold shadow-lg">ДОБАВИТЬ</button>
            </div>
        </div>
        <ul id="task-list" class="space-y-3"></ul>
    </div>

    <!-- NOTES SECTION -->
    <div id="section-notes" class="hidden-section space-y-6">
        <div class="flex gap-2">
            <input type="text" id="note-title" placeholder="Заголовок заметки..." class="flex-1 rounded-2xl border-none bg-white dark:bg-zinc-900 p-4 shadow-sm">
            <button onclick="addNote()" class="bg-primary text-white px-6 rounded-2xl font-bold">ОК</button>
        </div>
        <div id="notes-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
    </div>

</main>

<nav class="fixed bottom-0 left-0 w-full h-24 bg-white/95 dark:bg-zinc-950/95 backdrop-blur-xl flex justify-around items-center px-6 border-t dark:border-white/5 z-50 pb-6">
    <button onclick="showSection('home')" id="nav-home" class="flex flex-col items-center p-4 opacity-30"><span class="material-symbols-outlined">home</span></button>
    <button onclick="showSection('timesheet')" id="nav-timesheet" class="flex flex-col items-center p-4 opacity-30"><span class="material-symbols-outlined">calendar_month</span></button>
    <button onclick="showSection('tasks')" id="nav-tasks" class="flex flex-col items-center p-4 opacity-30"><span class="material-symbols-outlined">checklist</span></button>
    <button onclick="showSection('notes')" id="nav-notes" class="flex flex-col items-center p-4 opacity-30"><span class="material-symbols-outlined">description</span></button>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('prod_v11_db')) || {};
    let template = JSON.parse(localStorage.getItem('prod_template_v11')) || {
        0: {s1:'07:00', e1:'17:00', s2:'', e2:''}, 1: {s1:'', e1:'', s2:'14:00', e2:'22:00'},
        2: {s1:'', e1:'', s2:'', e2:''}, 3: {s1:'', e1:'', s2:'13:00', e2:'23:00'},
        4: {s1:'07:00', e1:'09:00', s2:'14:00', e2:'23:59'}, 5: {s1:'', e1:'', s2:'', e2:''},
        6: {s1:'', e1:'', s2:'', e2:''}
    };
    let selectedDate = new Date().toISOString().split('T')[0];
    const audio = document.getElementById('alarm-audio');
    let drawingNoteIndex = null;

    // --- CANVAS LOGIC (СТИЛУС) ---
    const canvas = document.getElementById('note-canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function resizeCanvas() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        ctx.lineCap = 'round';
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#1b1c1c';
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e.touches[0]); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
    canvas.addEventListener('touchend', stopDraw);

    function startDraw(e) { drawing = true; draw(e); }
    function stopDraw() { drawing = false; ctx.beginPath(); }
    function draw(e) {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    }

    function openDrawing(i) {
        drawingNoteIndex = i;
        document.getElementById('canvas-modal').classList.remove('hidden');
        resizeCanvas();
        if(db[selectedDate].notes_list[i].canvasData) {
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0);
            img.src = db[selectedDate].notes_list[i].canvasData;
        }
    }

    function saveCanvas() {
        db[selectedDate].notes_list[drawingNoteIndex].canvasData = canvas.toDataURL();
        saveAll(); renderNotes(); closeCanvas();
    }
    function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); }
    function closeCanvas() { document.getElementById('canvas-modal').classList.add('hidden'); }

    // --- PHOTO LOGIC ---
    function addPhotoToNote(i) {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*';
        input.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                db[selectedDate].notes_list[i].photo = ev.target.result;
                saveAll(); renderNotes();
            };
            reader.readAsDataURL(e.target.files[0]);
        };
        input.click();
    }

    // --- TEMPLATE LOGIC ---
    function toggleTemplateEditor() { document.getElementById('template-editor').classList.toggle('hidden-section'); renderTemplateList(); }
    function renderTemplateList() {
        const list = document.getElementById('template-list');
        const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
        list.innerHTML = days.map((name, i) => `
            <div class="p-4 bg-zinc-50 dark:bg-zinc-800 rounded-2xl space-y-2">
                <p class="font-black text-[9px] uppercase tracking-widest text-primary">${name}</p>
                <div class="grid grid-cols-2 gap-2">
                    <input type="time" value="${template[i].s1}" onchange="updateTemplate(${i}, 's1', this.value)" class="text-xs rounded-lg border-none bg-white dark:bg-zinc-700">
                    <input type="time" value="${template[i].e1}" onchange="updateTemplate(${i}, 'e1', this.value)" class="text-xs rounded-lg border-none bg-white dark:bg-zinc-700">
                    <input type="time" value="${template[i].s2}" onchange="updateTemplate(${i}, 's2', this.value)" class="text-xs rounded-lg border-none bg-white dark:bg-zinc-700">
                    <input type="time" value="${template[i].e2}" onchange="updateTemplate(${i}, 'e2', this.value)" class="text-xs rounded-lg border-none bg-white dark:bg-zinc-700">
                </div>
            </div>
        `).join('');
    }
    function updateTemplate(day, field, val) { template[day][field] = val; localStorage.setItem('prod_template_v11', JSON.stringify(template)); }
    
    function applyWeekTemplate() {
        const today = new Date(selectedDate);
        const sun = new Date(today); sun.setDate(today.getDate() - today.getDay());
        if(confirm("Применить ваш шаблон на текущую неделю?")) {
            for(let i=0; i<7; i++) {
                const d = new Date(sun); d.setDate(sun.getDate() + i);
                const ds = d.toISOString().split('T')[0];
                if(!db[ds]) db[ds] = { tasks: [], notes_list: [] };
                Object.assign(db[ds], template[i]);
            }
            saveAll(); showSection('home');
        }
    }

    // --- CORE APP ---
    function unlockAudio() {
        audio.play().then(() => { audio.pause(); audio.currentTime = 0; document.getElementById('audio-btn').innerText = "🔔 ВКЛ"; });
    }

    function showSection(id) {
        document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden-section'));
        document.getElementById('section-' + id).classList.remove('hidden-section');
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-nav', 'opacity-100'));
        document.getElementById('nav-' + id).classList.add('active-nav', 'opacity-100');
        document.getElementById('header-title').innerText = id.toUpperCase();
        if(id === 'home') renderMonthCalendar();
        if(id === 'tasks') { checkTaskRollover(); renderCalendarStrip(); }
        if(id === 'notes') renderNotes();
        if(id === 'timesheet') document.getElementById('ts-date-picker').value = selectedDate;
        loadDayData();
    }

    function renderMonthCalendar() {
        const grid = document.getElementById('month-grid'); grid.innerHTML = '';
        const now = new Date(); const first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
        const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'].forEach(h => grid.innerHTML += `<div class="text-[9px] font-bold opacity-30">${h}</div>`);
        for(let i=0; i<first; i++) grid.innerHTML += `<div></div>`;
        for(let i=1; i<=days; i++) {
            const ds = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const d = db[ds] || {}; let dot = ""; const last = d.e2 || d.e1;
            if(last) dot = `<div class="w-1 h-1 rounded-full mt-1 ${parseInt(last)<17?'dot-day':'dot-late'}"></div>`;
            const btn = document.createElement('button');
            btn.className = `calendar-day-btn ${ds === new Date().toISOString().split('T')[0] ? 'bg-primary text-white font-bold' : 'bg-white dark:bg-zinc-800'}`;
            btn.innerHTML = `<span>${i}</span>${dot}`; btn.onclick = () => showDayPreview(ds); grid.appendChild(btn);
        }
    }

    function showDayPreview(ds) {
        selectedDate = ds; const d = db[ds] || {tasks:[]};
        document.getElementById('day-preview-card').classList.remove('hidden');
        document.getElementById('preview-date-title').innerText = new Date(ds).toLocaleDateString('ru-RU', {day:'numeric', month:'long'});
        document.getElementById('preview-shifts').innerHTML = `<div>🌅 ${d.s1||'--'}-${d.e1||'--'}</div><div>🌙 ${d.s2||'--'}-${d.e2||'--'}</div>`;
        document.getElementById('preview-task-list').innerHTML = (d.tasks || []).map((t,i) => `
            <div class="flex items-center gap-2 text-[10px] p-2 bg-black/5 rounded-lg">
                <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${i})" class="w-3 h-3 rounded-full text-primary">
                <span class="${t.done?'line-through opacity-40':''}">${t.text}</span>
            </div>`).join('') || "<p class='text-[10px] opacity-20 text-center py-2'>Пусто</p>";
    }

    function saveData() {
        if(!db[selectedDate]) db[selectedDate] = { tasks: [], notes_list: [], s1:'', e1:'', s2:'', e2:'' };
        const d = db[selectedDate];
        const s1 = document.getElementById('ts-s1');
        if(s1) { d.s1=s1.value; d.e1=document.getElementById('ts-e1').value; d.s2=document.getElementById('ts-s2').value; d.e2=document.getElementById('ts-e2').value; }
        saveAll(); updateDashboard();
    }

    function saveAll() { localStorage.setItem('prod_v11_db', JSON.stringify(db)); }

    function loadDayData() {
        const d = db[selectedDate] || {tasks:[], notes_list:[]};
        if(document.getElementById('ts-s1')) {
            document.getElementById('ts-s1').value = d.s1||''; document.getElementById('ts-e1').value = d.e1||'';
            document.getElementById('ts-s2').value = d.s2||''; document.getElementById('ts-e2').value = d.e2||'';
        }
        updateDashboard(); renderTasks();
    }

    function updateDashboard() {
        const now = new Date(); const today = now.toISOString().split('T')[0]; const d = db[today] || {};
        const getM = (t) => t ? parseInt(t.split(':')[0])*60 + parseInt(t.split(':')[1]) : 0;
        let tot = 0; if(d.s1 && d.e1) tot += (getM(d.e1) - getM(d.s1)); if(d.s2 && d.e2) tot += (getM(d.e2) - getM(d.s2));
        if(document.getElementById('ts-total')) document.getElementById('ts-total').innerText = (tot/60).toFixed(1) + ' ч';
        if(document.getElementById('home-hours')) document.getElementById('home-hours').innerText = (tot/60).toFixed(1);
        const curM = now.getHours()*60 + now.getMinutes();
        let next = "--:--"; if(getM(d.e1) > curM) next = d.e1; else if(getM(d.e2) > curM) next = d.e2;
        if(document.getElementById('home-alarm')) document.getElementById('home-alarm').innerText = next;
    }

    function addTask() {
        const val = document.getElementById('task-input').value; if(!val.trim()) return;
        if(!db[selectedDate]) db[selectedDate] = { tasks: [], notes_list: [] };
        db[selectedDate].tasks.push({ text: val, priority: document.getElementById('task-priority').value, done: false });
        document.getElementById('task-input').value = ''; saveAll(); renderTasks();
    }

    function renderTasks() {
        const list = document.getElementById('task-list'); if(!list) return;
        list.innerHTML = (db[selectedDate]?.tasks || []).map((t, i) => `
            <li class="flex items-center justify-between p-5 bg-white dark:bg-zinc-900 rounded-3xl shadow-sm border dark:border-white/5">
                <div class="flex items-center gap-4">
                    <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${i})" class="w-5 h-5 rounded-full text-primary">
                    <div><span class="text-[8px] font-black uppercase ${t.priority.includes('🚨')?'text-red-500':'text-primary'}">${t.priority}</span>
                    <p class="text-sm ${t.done?'line-through opacity-30':'font-bold'}">${t.text}</p></div>
                </div>
                <button onclick="deleteTask(${i})" class="opacity-20 material-symbols-outlined">delete</button>
            </li>`).join('');
    }

    function addNote() {
        const title = document.getElementById('note-title').value; if(!title.trim()) return;
        if(!db[selectedDate]) db[selectedDate] = { tasks: [], notes_list: [] };
        db[selectedDate].notes_list.push({ title: title, content: '', photo: null, canvasData: null, color: '#fffbeb' });
        document.getElementById('note-title').value = ''; saveAll(); renderNotes();
    }

    function renderNotes() {
        const grid = document.getElementById('notes-grid'); if(!grid) return;
        grid.innerHTML = (db[selectedDate]?.notes_list || []).map((n, i) => `
            <div class="p-5 rounded-[2rem] bg-amber-50 dark:bg-zinc-800 shadow-sm space-y-3">
                <div class="flex justify-between items-center"><h4 class="font-black text-xs uppercase">${n.title}</h4><button onclick="deleteNote(${i})" class="opacity-30">×</button></div>
                ${n.photo ? `<img src="${n.photo}" class="w-full h-32 object-cover rounded-2xl">` : ''}
                ${n.canvasData ? `<img src="${n.canvasData}" class="w-full bg-white rounded-xl border border-black/5">` : ''}
                <textarea onchange="updateNote(${i}, this.value)" class="w-full bg-transparent border-none p-0 text-xs focus:ring-0 h-16" placeholder="Заметки...">${n.content||''}</textarea>
                <div class="flex gap-2">
                    <button onclick="addPhotoToNote(${i})" class="flex-1 py-2 bg-white/50 dark:bg-zinc-700 rounded-xl text-[8px] font-bold uppercase tracking-widest">+ ФОТО</button>
                    <button onclick="openDrawing(${i})" class="flex-1 py-2 bg-primary text-white rounded-xl text-[8px] font-bold uppercase tracking-widest">РИСОВАТЬ</button>
                </div>
            </div>`).join('');
    }

    function updateNote(i, v) { db[selectedDate].notes_list[i].content = v; saveAll(); }
    function deleteNote(i) { db[selectedDate].notes_list.splice(i,1); saveAll(); renderNotes(); }

    function toggleTheme() { document.documentElement.classList.toggle('dark'); }

    function updateClock() {
        const now = new Date();
        if(document.getElementById('home-clock')) document.getElementById('home-clock').innerText = now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('top-clock').innerText = now.toLocaleTimeString('ru-RU');
        document.getElementById('home-date').innerText = now.toLocaleDateString('ru-RU', {weekday:'long', day:'numeric', month:'long'});
        if (now.getSeconds() === 0) checkAlarms(now);
    }

    function checkAlarms(now) {
        const d = db[now.toISOString().split('T')[0]]; if(!d) return;
        const cur = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        const chk = (e) => {
            if(!e) return; const [h,m] = e.split(':'); let t = parseInt(h)*60 + parseInt(m) - 5;
            let target = Math.floor(t/60).toString().padStart(2,'0') + ":" + (t%60).toString().padStart(2,'0');
            if(cur === target) { audio.play(); alert(`🔔 До конца смены 5 минут! (${e})`); }
        };
        chk(d.e1); chk(d.e2);
    }

    function renderCalendarStrip() {
        const box = document.getElementById('calendar-strip'); if(!box) return; box.innerHTML = '';
        const sun = new Date(); sun.setDate(sun.getDate() - sun.getDay());
        for(let i=0; i<14; i++) {
            const d = new Date(sun); d.setDate(sun.getDate() + i); const ds = d.toISOString().split('T')[0];
            const btn = document.createElement('button');
            btn.className = `flex-shrink-0 w-14 py-5 rounded-3xl flex flex-col items-center bg-white dark:bg-zinc-900 shadow-sm transition-all ${ds === selectedDate ? 'active-day scale-110 shadow-lg' : 'opacity-40'}`;
            btn.innerHTML = `<span class="text-[8px] font-bold uppercase mb-1">${d.toLocaleDateString('ru-RU',{weekday:'short'})}</span><span class="text-base font-black">${d.getDate()}</span>`;
            btn.onclick = () => { selectedDate = ds; renderCalendarStrip(); loadDayData(); }; box.appendChild(btn);
        }
    }

    function checkTaskRollover() {
        const today = new Date().toISOString().split('T')[0];
        Object.keys(db).forEach(date => {
            if(date < today && db[date].tasks) {
                db[date].tasks.forEach(t => {
                    if(!t.done && !t.rolled) {
                        if(!db[today]) db[today] = { tasks: [], notes_list: [] };
                        db[today].tasks.push({ ...t, text: t.text + " (🗓️)" }); t.rolled = true;
                    }
                });
            }
        });
        saveAll();
    }

    function addQuickTask() {
        const val = document.getElementById('quick-task-input').value; if(!val.trim()) return;
        if(!db[selectedDate]) db[selectedDate] = { tasks: [] };
        db[selectedDate].tasks.push({ text: val, priority: '☕ Обычное', done: false });
        document.getElementById('quick-task-input').value = ''; saveAll(); showDayPreview(selectedDate);
    }

    function clearDayData() { if(confirm("Очистить?")) { delete db[selectedDate]; saveAll(); renderMonthCalendar(); document.getElementById('day-preview-card').classList.add('hidden'); } }

    window.onload = () => { showSection('home'); setInterval(updateClock, 1000); };
</script>
</body>
</html>
