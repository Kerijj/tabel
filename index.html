<!DOCTYPE html>
<html class="dark" lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Productivity Assistant</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ecbaba",
                        "on-primary": "#593738",
                        "primary-container": "#613d3e",
                        "surface": "#0d0e0e",
                        "surface-container": "#181a1a",
                        "surface-container-high": "#232627",
                        "on-surface": "#e4e6e6",
                        "on-surface-variant": "#a9abab",
                        "secondary": "#a69b9b",
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d0e0e; color: #e4e6e6; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-day { background-color: #ecbaba !important; color: #0d0e0e !important; transform: scale(1.1); }
    </style>
</head>
<body class="pb-32">

    <audio id="alarm-audio" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <!-- Header -->
    <header class="fixed top-0 w-full z-50 bg-[#0d0e0e]/90 backdrop-blur-md flex justify-between items-center px-6 h-16 border-b border-surface-container-high">
        <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-primary">schedule</span>
            <h1 class="text-lg font-bold">Productivity App</h1>
        </div>
        <div id="clock" class="text-primary font-mono font-bold">00:00:00</div>
    </header>

    <main class="pt-20 px-6 max-w-2xl mx-auto space-y-6">
        
        <!-- Календарная лента -->
        <section class="mt-4">
            <div id="calendar-strip" class="flex gap-3 overflow-x-auto no-scrollbar py-4 px-2">
                <!-- Дни генерятся через JS -->
            </div>
        </section>

        <!-- Табель -->
        <section class="bg-surface-container p-6 rounded-2xl border border-surface-container-high">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-primary text-[10px] font-bold uppercase tracking-widest">Табель рабочего времени</h2>
                <button onclick="applyToWeek()" class="text-[10px] text-secondary border border-secondary/30 px-2 py-1 rounded-lg hover:bg-white/5">Применить ко всей неделе</button>
            </div>
            
            <div class="grid grid-cols-3 gap-3 mb-4">
                <div>
                    <label class="block text-[10px] text-secondary mb-1 uppercase">Начало</label>
                    <input type="time" id="start-time" onchange="saveDayData()" class="w-full bg-surface-container-high border-none rounded-lg text-sm text-on-surface">
                </div>
                <div>
                    <label class="block text-[10px] text-secondary mb-1 uppercase">Конец</label>
                    <input type="time" id="end-time" onchange="saveDayData()" class="w-full bg-surface-container-high border-none rounded-lg text-sm text-on-surface">
                </div>
                <div>
                    <label class="block text-[10px] text-secondary mb-1 uppercase">Перерыв (мин)</label>
                    <input type="number" id="break-duration" value="60" onchange="saveDayData()" class="w-full bg-surface-container-high border-none rounded-lg text-sm text-on-surface">
                </div>
            </div>

            <div class="flex items-center justify-between bg-primary-container/20 p-4 rounded-xl border border-primary/10">
                <div>
                    <p class="text-[10px] text-secondary uppercase">Итого за день:</p>
                    <p class="text-xl font-bold text-primary" id="total-hours">0 ч 0 мин</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-primary font-bold uppercase">Будильник (за 5 мин)</p>
                    <p class="text-lg text-on-surface" id="alarm-time-display">--:--</p>
                </div>
            </div>
        </section>

        <!-- Задачи -->
        <section class="bg-surface-container p-6 rounded-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">Задачи на день</h3>
                <span id="task-count" class="text-xs bg-primary text-on-primary px-2 py-0.5 rounded-full font-bold">0</span>
            </div>
            <div class="flex gap-2 mb-4">
                <input type="text" id="task-input" placeholder="Добавить задачу..." class="flex-1 bg-surface-container-high border-none rounded-xl text-on-surface focus:ring-1 focus:ring-primary">
                <button onclick="addTask()" class="bg-primary text-on-primary w-12 h-12 rounded-xl font-bold flex items-center justify-center active:scale-90 transition-all">
                    <span class="material-symbols-outlined">add</span>
                </button>
            </div>
            <ul id="task-list" class="space-y-2"></ul>
        </section>

        <!-- Заметки -->
        <section>
            <h3 class="text-sm font-bold text-secondary uppercase mb-2 ml-1">Заметки</h3>
            <textarea id="notes-input" oninput="saveDayData()" placeholder="Напишите что-нибудь..." class="w-full h-24 bg-surface-container border-none rounded-2xl text-on-surface focus:ring-primary p-4"></textarea>
        </section>

        <!-- Факт -->
        <section class="bg-primary/5 border border-primary/10 p-5 rounded-2xl">
            <div class="flex items-center gap-2 mb-2 text-primary">
                <span class="material-symbols-outlined text-sm">lightbulb</span>
                <span class="text-[10px] font-bold uppercase tracking-widest">Случайный факт</span>
            </div>
            <p id="fact-text" class="text-sm text-on-surface-variant italic">Загрузка...</p>
        </section>

    </main>

    <!-- Навигация -->
    <nav class="fixed bottom-0 left-0 w-full h-20 bg-surface/80 backdrop-blur-xl flex justify-around items-center border-t border-white/5 z-50">
        <button class="flex flex-col items-center text-primary">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] font-bold mt-1">Главная</span>
        </button>
        <button class="flex flex-col items-center text-secondary">
            <span class="material-symbols-outlined">description</span>
            <span class="text-[10px] font-bold mt-1">Заметки</span>
        </button>
    </nav>

    <script>
        let selectedDate = new Date().toISOString().split('T')[0];
        let db = JSON.parse(localStorage.getItem('productivity_db')) || {};

        // 1. КАЛЕНДАРЬ
        function initCalendar() {
            const strip = document.getElementById('calendar-strip');
            strip.innerHTML = '';
            const today = new Date();
            
            for (let i = -3; i < 14; i++) {
                const date = new Date();
                date.setDate(today.getDate() + i);
                const dateStr = date.toISOString().split('T')[0];
                const dayName = date.toLocaleDateString('ru-RU', { weekday: 'short' });
                const dayNum = date.getDate();

                const div = document.createElement('button');
                div.className = `flex flex-col items-center justify-center min-w-[50px] py-3 rounded-xl bg-surface-container transition-all ${dateStr === selectedDate ? 'active-day' : ''}`;
                div.innerHTML = `<span class="text-[10px] uppercase font-bold">${dayName}</span><span class="text-lg font-extrabold">${dayNum}</span>`;
                div.onclick = () => {
                    selectedDate = dateStr;
                    initCalendar();
                    loadDayData();
                };
                strip.appendChild(div);
            }
        }

        // 2. ЧАСЫ И БУДИЛЬНИК
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('ru-RU');
            
            // Проверка будильника
            const currentDay = now.toISOString().split('T')[0];
            if (db[currentDay] && db[currentDay].endTime) {
                const [h, m] = db[currentDay].endTime.split(':');
                const endTimestamp = new Date();
                endTimestamp.setHours(h, m, 0);
                
                const alarmTime = new Date(endTimestamp.getTime() - 5 * 60000);
                if (now.getHours() === alarmTime.getHours() && now.getMinutes() === alarmTime.getMinutes() && now.getSeconds() === 0) {
                    document.getElementById('alarm-audio').play();
                    alert("До конца смены 5 минут!");
                }
            }
        }

        // 3. ДАННЫЕ ДНЯ
        function loadDayData() {
            const data = db[selectedDate] || { startTime: '09:00', endTime: '18:00', break: 60, tasks: [], notes: '' };
            
            document.getElementById('start-time').value = data.startTime;
            document.getElementById('end-time').value = data.endTime;
            document.getElementById('break-duration').value = data.break;
            document.getElementById('notes-input').value = data.notes || '';
            
            renderTasks(data.tasks || []);
            calculateHours();
        }

        function saveDayData() {
            if (!db[selectedDate]) db[selectedDate] = {};
            
            db[selectedDate].startTime = document.getElementById('start-time').value;
            db[selectedDate].endTime = document.getElementById('end-time').value;
            db[selectedDate].break = document.getElementById('break-duration').value;
            db[selectedDate].notes = document.getElementById('notes-input').value;
            
            localStorage.setItem('productivity_db', JSON.stringify(db));
            calculateHours();
        }

        function calculateHours() {
            const start = document.getElementById('start-time').value;
            const end = document.getElementById('end-time').value;
            const breakMin = parseInt(document.getElementById('break-duration').value) || 0;

            if (start && end) {
                const s = start.split(':');
                const e = end.split(':');
                const startDate = new Date(0,0,0, s[0], s[1]);
                const endDate = new Date(0,0,0, e[0], e[1]);
                
                let diff = (endDate - startDate) / 1000 / 60;
                diff -= breakMin;
                if (diff < 0) diff = 0;

                const h = Math.floor(diff / 60);
                const m = diff % 60;
                document.getElementById('total-hours').innerText = `${h} ч ${m} мин`;

                // Показ времени будильника
                const alarmDate = new Date(endDate.getTime() - 5 * 60000);
                document.getElementById('alarm-time-display').innerText = 
                    String(alarmDate.getHours()).padStart(2, '0') + ":" + String(alarmDate.getMinutes()).padStart(2, '0');
            }
        }

        // 4. ЗАДАЧИ
        function addTask() {
            const input = document.getElementById('task-input');
            if (!input.value.trim()) return;

            if (!db[selectedDate]) db[selectedDate] = {};
            if (!db[selectedDate].tasks) db[selectedDate].tasks = [];

            db[selectedDate].tasks.push({ text: input.value, done: false });
            input.value = '';
            saveDayData();
            renderTasks(db[selectedDate].tasks);
        }

        function renderTasks(tasks) {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            tasks.forEach((t, i) => {
                const li = document.createElement('li');
                li.className = "bg-surface-container-high p-3 rounded-xl flex items-center justify-between";
                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${i})" class="rounded border-primary bg-transparent text-primary focus:ring-0">
                        <span class="text-sm ${t.done ? 'line-through text-secondary' : ''}">${t.text}</span>
                    </div>
                    <button onclick="deleteTask(${i})" class="text-secondary hover:text-primary">
                        <span class="material-symbols-outlined text-sm">delete</span>
                    </button>
                `;
                list.appendChild(li);
            });
            document.getElementById('task-count').innerText = tasks.length;
        }

        function toggleTask(i) {
            db[selectedDate].tasks[i].done = !db[selectedDate].tasks[i].done;
            saveDayData();
            renderTasks(db[selectedDate].tasks);
        }

        function deleteTask(i) {
            db[selectedDate].tasks.splice(i, 1);
            saveDayData();
            renderTasks(db[selectedDate].tasks);
        }

        // 5. МАССОВОЕ ЗАПОЛНЕНИЕ
        function applyToWeek() {
            const start = document.getElementById('start-time').value;
            const end = document.getElementById('end-time').value;
            const breakM = document.getElementById('break-duration').value;

            if(confirm("Применить это время ко всем дням в календаре?")) {
                const today = new Date();
                for (let i = -3; i < 14; i++) {
                    const d = new Date();
                    d.setDate(today.getDate() + i);
                    const ds = d.toISOString().split('T')[0];
                    if (!db[ds]) db[ds] = { tasks: [], notes: '' };
                    db[ds].startTime = start;
                    db[ds].endTime = end;
                    db[ds].break = breakM;
                }
                localStorage.setItem('productivity_db', JSON.stringify(db));
                alert("Расписание обновлено!");
            }
        }

        // 6. ФАКТЫ
        const facts = [
            "Пчёлы могут распознавать человеческие лица.",
            "Для мозга работа — это естественное состояние.",
            "20 минут сна днем повышают продуктивность на 34%.",
            "Многозадачность снижает IQ на 10 пунктов."
        ];
        function showFact() {
            document.getElementById('fact-text').innerText = facts[Math.floor(Math.random()*facts.length)];
        }

        window.onload = () => {
            initCalendar();
            loadDayData();
            setInterval(updateClock, 1000);
            showFact();
        };
    </script>
</body>
</html>
