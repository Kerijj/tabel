<!DOCTYPE html>
<html class="light" lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Productivity Life Pro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7b5455",
                        "primary-light": "#ecbaba",
                        "surface": "#faf9f9",
                        "surface-dark": "#0d0e0e",
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; }
        .hidden-section { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-nav { background-color: #ecbaba !important; color: #1b1c1c !important; border-radius: 20px; }
        .active-day { border: 2px solid #7b5455 !important; font-weight: 800; transform: scale(1.05); }
        .dot-day { background-color: #7b5455; }
        .dot-late { background-color: #ba1a1a; }
        body { transition: background 0.3s; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        .calendar-day-btn { aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 14px; font-size: 0.75rem; border: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body class="bg-surface dark:bg-surface-dark text-slate-900 dark:text-gray-100">

<audio id="alarm-audio" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto" loop></audio>

<!-- AppBar -->
<header class="fixed top-0 w-full z-50 bg-white/90 dark:bg-zinc-950/90 backdrop-blur-md border-b dark:border-white/5 px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary">auto_awesome</span>
        <h1 id="header-title" class="text-xs font-black uppercase tracking-widest text-primary">Главная</h1>
    </div>
    <div class="flex items-center gap-3">
        <button onclick="unlockAudio()" id="audio-btn" class="bg-primary text-white text-[9px] font-bold px-3 py-1.5 rounded-full shadow-lg">🔔 ВКЛ ЗВУК</button>
        <button onclick="toggleTheme()" class="material-symbols-outlined opacity-50">contrast</button>
        <div id="top-clock" class="font-mono font-bold text-[10px] text-primary">00:00:00</div>
    </div>
</header>

<main class="pt-20 pb-36 px-6 max-w-2xl mx-auto space-y-8">

    <!-- HOME SECTION -->
    <div id="section-home" class="space-y-6">
        <section class="rounded-[2.5rem] bg-white dark:bg-zinc-900 p-8 shadow-xl border dark:border-white/5 relative overflow-hidden text-center">
            <p id="home-date" class="text-[10px] font-bold opacity-40 uppercase tracking-[0.2em] mb-2">Загрузка...</p>
            <h2 id="home-clock" class="text-6xl font-black tracking-tighter text-primary dark:text-primary-light mb-6">00:00</h2>
            <div class="grid grid-cols-2 gap-4 border-t dark:border-white/10 pt-6">
                <div><p class="text-[9px] font-bold opacity-40 uppercase">Сегодня</p><p id="home-hours" class="text-2xl font-black">0.0 ч</p></div>
                <div><p class="text-[9px] font-bold opacity-40 uppercase text-red-500">Сигнал</p><p id="home-alarm" class="text-xl font-bold text-primary">--:--</p></div>
            </div>
        </section>

        <!-- Аффирмация -->
        <section id="affirmation-card" class="bg-primary/5 p-6 rounded-[2rem] border border-primary/10 flex flex-col items-center">
            <span class="material-symbols-outlined text-primary mb-2">favorite</span>
            <p id="affirmation-text" class="text-sm italic font-medium opacity-80 text-center leading-relaxed">Ты делаешь этот мир лучше своим трудом.</p>
        </section>

        <!-- Календарь -->
        <section class="bg-white dark:bg-zinc-900 p-6 rounded-[2rem] shadow-sm border dark:border-white/5">
            <h3 class="text-[10px] font-black uppercase opacity-40 mb-4 text-center">График (Вс-Сб)</h3>
            <div id="month-grid" class="grid grid-cols-7 gap-2"></div>
        </section>

        <!-- Обзор дня -->
        <div id="day-preview-card" class="hidden bg-white dark:bg-zinc-800 border-2 border-primary/20 p-6 rounded-[2.5rem] space-y-4 shadow-2xl animate-in slide-in-from-bottom-4 duration-300">
            <div class="flex justify-between items-center">
                <h4 id="preview-date-title" class="font-black text-primary uppercase text-sm">--</h4>
                <button onclick="clearDayData()" class="text-[9px] bg-red-100 text-red-600 px-3 py-1 rounded-full font-bold uppercase">Очистить</button>
            </div>
            <div id="preview-shifts" class="grid grid-cols-2 gap-2 text-xs font-bold text-primary text-center"></div>
            <div id="preview-task-list" class="space-y-2 max-h-32 overflow-y-auto no-scrollbar"></div>
            <div class="flex gap-2">
                <input type="text" id="quick-task-input" placeholder="Добавить задачу..." class="flex-1 bg-primary/5 border-none rounded-xl text-xs p-3 focus:ring-1 focus:ring-primary">
                <button onclick="addQuickTask()" class="bg-primary text-white px-4 rounded-xl font-bold shadow-lg">+</button>
            </div>
        </div>
    </div>

    <!-- TIMESHEET SECTION -->
    <div id="section-timesheet" class="hidden-section space-y-6">
        <div class="bg-white dark:bg-zinc-900 p-6 rounded-[2.5rem] shadow-lg border-2 border-primary/20 space-y-6">
            <div class="flex flex-col gap-1">
                <p class="text-[10px] font-black opacity-40 uppercase ml-2 tracking-widest text-center">Шаг 1: Выберите дату</p>
                <input type="date" id="ts-date-picker" onchange="changeDate(this.value)" class="bg-primary/10 border-none rounded-2xl font-bold text-primary p-4 w-full">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="p-4 rounded-2xl border-2 border-primary bg-primary/5 text-center">
                    <p class="text-[9px] font-black text-primary uppercase mb-2">Смена 1</p>
                    <input type="time" id="ts-s1" onchange="saveData()" class="w-full bg-white dark:bg-zinc-800 rounded-xl p-2 mb-2 font-black">
                    <input type="time" id="ts-e1" onchange="saveData()" class="w-full bg-white dark:bg-zinc-800 rounded-xl p-2 font-black">
                </div>
                <div class="p-4 rounded-2xl border-2 border-primary bg-primary/5 text-center">
                    <p class="text-[9px] font-black text-primary uppercase mb-2">Смена 2</p>
                    <input type="time" id="ts-s2" onchange="saveData()" class="w-full bg-white dark:bg-zinc-800 rounded-xl p-2 mb-2 font-black">
                    <input type="time" id="ts-e2" onchange="saveData()" class="w-full bg-white dark:bg-zinc-800 rounded-xl p-2 font-black">
                </div>
            </div>

            <div class="grid grid-cols-1 gap-2">
                <button onclick="applyFullSchedule()" class="py-4 bg-primary text-white rounded-3xl font-black text-[10px] uppercase shadow-lg">📅 Мой стандартный график</button>
                <button onclick="document.getElementById('ocr-upload').click()" class="py-3 bg-primary/10 text-primary border-2 border-primary rounded-3xl font-black text-[10px] uppercase">📸 Распознать все часы с фото</button>
                <input type="file" id="ocr-upload" accept="image/*" class="hidden" onchange="processImage(this)">
            </div>
            
            <div id="ocr-loader" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex flex-col items-center justify-center z-[100]">
                <div class="w-12 h-12 border-4 border-white border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-white font-bold uppercase tracking-widest text-xs">Ищу время на фото...</p>
            </div>
        </div>
    </div>

    <!-- TASKS SECTION -->
    <div id="section-tasks" class="hidden-section space-y-6">
        <div id="calendar-strip" class="flex gap-3 overflow-x-auto no-scrollbar py-2 px-1"></div>
        <div class="bg-white dark:bg-zinc-900 p-6 rounded-[2.5rem] space-y-4 shadow-sm border dark:border-white/5">
            <input type="text" id="task-input" placeholder="Что сделать?" class="w-full rounded-2xl border-none bg-surface dark:bg-zinc-800 p-4">
            <div class="flex items-center justify-between">
                <select id="task-priority" class="bg-primary/10 border-none rounded-xl text-xs font-bold text-primary p-2">
                    <option value="🚨 Срочно">🚨 Срочно</option>
                    <option value="⏳ Ждет">⏳ Ждет</option>
                    <option value="☕ Обычное">☕ Обычное</option>
                </select>
                <button onclick="addTask()" class="bg-primary text-white px-8 py-3 rounded-2xl font-bold shadow-lg">ДОБАВИТЬ</button>
            </div>
        </div>
        <ul id="task-list" class="space-y-3"></ul>
    </div>

    <!-- NOTES SECTION -->
    <div id="section-notes" class="hidden-section space-y-6">
        <div class="bg-white dark:bg-zinc-900 p-4 rounded-3xl shadow-sm border dark:border-white/5 space-y-3">
            <input type="text" id="note-title" placeholder="Новая заметка..." class="w-full rounded-xl border-none bg-primary/5 p-3 text-sm font-bold">
            <div class="flex gap-2">
                <button onclick="document.getElementById('note-photo').click()" class="flex-1 py-2 bg-gray-100 dark:bg-zinc-800 rounded-xl text-[10px] font-bold uppercase flex items-center justify-center gap-1">
                    <span class="material-symbols-outlined text-xs">add_a_photo</span> +ФОТО
                </button>
                <input type="file" id="note-photo" accept="image/*" class="hidden" onchange="handleNotePhoto(this)">
                <button onclick="addNote()" class="flex-1 py-2 bg-primary text-white rounded-xl text-[10px] font-bold uppercase shadow-md">СОЗДАТЬ</button>
            </div>
            <div id="note-photo-preview" class="hidden w-full h-20 rounded-xl overflow-hidden bg-black/5"></div>
        </div>
        <div id="notes-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
    </div>

</main>

<nav class="fixed bottom-0 left-0 w-full h-24 bg-white/95 dark:bg-zinc-950/95 backdrop-blur-xl flex justify-around items-center px-6 border-t dark:border-white/5 z-50 pb-6">
    <button onclick="showSection('home')" id="nav-home" class="flex flex-col items-center p-4 opacity-30 transition-all"><span class="material-symbols-outlined">home</span></button>
    <button onclick="showSection('timesheet')" id="nav-timesheet" class="flex flex-col items-center p-4 opacity-30 transition-all"><span class="material-symbols-outlined">calendar_today</span></button>
    <button onclick="showSection('tasks')" id="nav-tasks" class="flex flex-col items-center p-4 opacity-30 transition-all"><span class="material-symbols-outlined">checklist</span></button>
    <button onclick="showSection('notes')" id="nav-notes" class="flex flex-col items-center p-4 opacity-30 transition-all"><span class="material-symbols-outlined">description</span></button>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('prod_v10_db')) || {};
    let selectedDate = new Date().toISOString().split('T')[0];
    const audio = document.getElementById('alarm-audio');
    let alarmPlayedToday = { e1: false, e2: false };
    let tempNotePhoto = null;

    function unlockAudio() {
        audio.play().then(() => {
            audio.pause(); audio.currentTime = 0;
            document.getElementById('audio-btn').innerText = "✅ ЗВУК: ОК";
            document.getElementById('audio-btn').className = "bg-green-500 text-white text-[9px] font-bold px-3 py-1.5 rounded-full";
        });
    }

    function showSection(id) {
        document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden-section'));
        document.getElementById('section-' + id).classList.remove('hidden-section');
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-nav', 'opacity-100'));
        document.getElementById('nav-' + id).classList.add('active-nav', 'opacity-100');
        document.getElementById('header-title').innerText = id.toUpperCase();
        if(id === 'home') renderMonthCalendar();
        if(id === 'tasks') { checkTaskRollover(); renderCalendarStrip(); }
        if(id === 'notes') renderNotes();
        if(id === 'timesheet') document.getElementById('ts-date-picker').value = selectedDate;
        loadDayData();
    }

    // --- УЛУЧШЕННЫЙ OCR ДЛЯ ТАБЕЛЯ ---
    async function processImage(input) {
        if (!input.files?.[0]) return;
        document.getElementById('ocr-loader').classList.remove('hidden');
        try {
            const result = await Tesseract.recognize(input.files[0], 'eng+heb');
            const rawText = result.data.text.replace(/[\. ]/g, ':');
            // Ищем все вхождения времени или одиночных цифр
            const matches = rawText.match(/\b([0-2]?\d:[0-5]\d)\b|\b([0-2]?\d)\b/g);
            
            if (matches && matches.length >= 2) {
                const times = matches.map(m => m.includes(':') ? m.padStart(5, '0') : m.padStart(2, '0') + ":00");
                
                // Распределяем по 2 сменам
                document.getElementById('ts-s1').value = times[0];
                document.getElementById('ts-e1').value = times[1];
                if(times.length >= 4) {
                    document.getElementById('ts-s2').value = times[2];
                    document.getElementById('ts-e2').value = times[3];
                }
                saveData();
                alert("Время найдено! Проверьте правильность.");
            } else {
                alert("Числа не найдены. Попробуйте фото крупнее.");
            }
        } catch (e) { alert("Ошибка OCR"); }
        document.getElementById('ocr-loader').classList.add('hidden');
    }

    // --- ГРАФИК ЕВГЕНИИ ---
    function applyFullSchedule() {
        const today = new Date();
        const start = new Date(today); start.setDate(today.getDate() - today.getDay());
        const sch = {
            0: { s1: '07:00', e1: '17:00' }, 1: { s2: '13:59', e2: '21:59' }, 
            3: { s2: '12:59', e2: '22:59' }, 4: { s1: '07:00', e1: '09:00', s2: '13:59', e2: '23:59' }
        };
        if(confirm("Заполнить неделю по вашему стандарту?")) {
            for(let i=0; i<7; i++) {
                let d = new Date(start); d.setDate(start.getDate() + i);
                let ds = d.toISOString().split('T')[0];
                if(!db[ds]) db[ds] = { tasks: [], notes_list: [] };
                Object.assign(db[ds], sch[i] || {s1:'', e1:'', s2:'', e2:''});
            }
            saveData(); alert("Готово!"); showSection('home');
        }
    }

    // --- ФУНКЦИИ ЗАМЕТОК С ФОТО ---
    function handleNotePhoto(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            tempNotePhoto = e.target.result;
            const prev = document.getElementById('note-photo-preview');
            prev.innerHTML = `<img src="${tempNotePhoto}" class="w-full h-full object-cover">`;
            prev.classList.remove('hidden');
        };
        reader.readAsDataURL(input.files[0]);
    }

    function addNote() {
        const title = document.getElementById('note-title');
        if(!title.value.trim()) return;
        if(!db[selectedDate]) db[selectedDate] = { notes_list: [] };
        if(!db[selectedDate].notes_list) db[selectedDate].notes_list = [];
        
        db[selectedDate].notes_list.push({
            title: title.value,
            content: '',
            photo: tempNotePhoto,
            color: ['#fffbeb', '#f0fdf4', '#eff6ff'][Math.floor(Math.random()*3)]
        });
        title.value = ''; tempNotePhoto = null;
        document.getElementById('note-photo-preview').classList.add('hidden');
        saveData(); renderNotes();
    }

    function renderNotes() {
        const grid = document.getElementById('notes-grid');
        if(!grid) return;
        grid.innerHTML = (db[selectedDate]?.notes_list || []).map((n, i) => `
            <div class="p-5 rounded-[2rem] shadow-sm space-y-3 border dark:border-white/10" style="background-color: ${n.color}">
                <div class="flex justify-between items-center"><h4 class="font-black text-slate-800 text-xs">${n.title}</h4><button onclick="deleteNote(${i})" class="opacity-20 text-black font-bold">×</button></div>
                ${n.photo ? `<img src="${n.photo}" class="w-full h-24 object-cover rounded-2xl shadow-sm">` : ''}
                <textarea onchange="updateNote(${i}, this.value)" class="w-full bg-transparent border-none p-0 text-xs text-slate-600 focus:ring-0 h-16" placeholder="Текст...">${n.content || ''}</textarea>
            </div>
        `).join('');
    }

    function updateNote(i, v) { db[selectedDate].notes_list[i].content = v; saveData(); }
    function deleteNote(i) { db[selectedDate].notes_list.splice(i,1); saveData(); renderNotes(); }

    // --- КАЛЕНДАРЬ ---
    function renderMonthCalendar() {
        const grid = document.getElementById('month-grid'); grid.innerHTML = '';
        const now = new Date(); const year = now.getFullYear(); const month = now.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const headers = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
        headers.forEach(h => grid.innerHTML += `<div class="text-[9px] font-bold opacity-30">${h}</div>`);
        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;
        for(let i=1; i<=daysInMonth; i++) {
            const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const isToday = ds === new Date().toISOString().split('T')[0];
            const d = db[ds] || {}; let dot = ""; const lastExit = d.e2 || d.e1;
            if(lastExit) dot = `<div class="w-1.5 h-1.5 rounded-full mt-1 ${parseInt(lastExit) < 17 ? 'dot-day' : 'dot-late'}"></div>`;
            const btn = document.createElement('button');
            btn.className = `calendar-day-btn ${isToday ? 'bg-primary text-white font-bold' : 'bg-white dark:bg-zinc-800'}`;
            btn.innerHTML = `<span>${i}</span>${dot}`;
            btn.onclick = () => showDayPreview(ds); grid.appendChild(btn);
        }
    }

    function showDayPreview(ds) {
        selectedDate = ds; const card = document.getElementById('day-preview-card');
        document.getElementById('preview-date-title').innerText = new Date(ds).toLocaleDateString('ru-RU', {day:'numeric', month:'long'});
        card.classList.remove('hidden'); renderDayPreviewContent();
    }

    function renderDayPreviewContent() {
        const d = db[selectedDate] || { s1:'', e1:'', s2:'', e2:'', tasks:[] };
        document.getElementById('preview-shifts').innerHTML = `
            <div class="bg-primary/5 p-2 rounded-xl">🌅 ${d.s1 || '--'} - ${d.e1 || '--'}</div>
            <div class="bg-primary/5 p-2 rounded-xl">🌙 ${d.s2 || '--'} - ${d.e2 || '--'}</div>
        `;
        document.getElementById('preview-task-list').innerHTML = (d.tasks || []).map((t, i) => `
            <div class="flex items-center gap-2 text-[10px] bg-black/5 p-2 rounded-lg">
                <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${i})" class="w-3 h-3 rounded-full text-primary">
                <span class="${t.done ? 'line-through opacity-40' : ''}">${t.text}</span>
            </div>
        `).join('') || "<p class='opacity-40 text-center py-2 text-[10px]'>Нет задач</p>";
    }

    function addQuickTask() {
        const val = document.getElementById('quick-task-input').value;
        if(!val.trim()) return; if(!db[selectedDate]) db[selectedDate] = { tasks: [] };
        db[selectedDate].tasks.push({ text: val, priority: '☕ Обычное', done: false });
        document.getElementById('quick-task-input').value = ''; saveData(); renderDayPreviewContent();
    }

    function clearDayData() { if(confirm("Сбросить?")) { delete db[selectedDate]; saveData(); renderMonthCalendar(); document.getElementById('day-preview-card').classList.add('hidden'); } }

    // --- СИСТЕМНЫЕ ФУНКЦИИ ---
    function changeDate(v) { selectedDate = v; loadDayData(); }
    function saveData() {
        if(!db[selectedDate]) db[selectedDate] = { tasks: [], notes_list: [], s1:'', e1:'', s2:'', e2:'' };
        const d = db[selectedDate]; const s1 = document.getElementById('ts-s1');
        if(s1) { d.s1 = s1.value; d.e1 = document.getElementById('ts-e1').value; d.s2 = document.getElementById('ts-s2').value; d.e2 = document.getElementById('ts-e2').value; }
        localStorage.setItem('prod_v10_db', JSON.stringify(db)); updateDashboard();
    }

    function loadDayData() {
        const d = db[selectedDate] || { s1:'', e1:'', s2:'', e2:'', tasks:[] };
        const s1_el = document.getElementById('ts-s1');
        if(s1_el) { s1_el.value = d.s1 || ''; document.getElementById('ts-e1').value = d.e1 || ''; document.getElementById('ts-s2').value = d.s2 || ''; document.getElementById('ts-e2').value = d.e2 || ''; }
        updateDashboard(); renderTasks();
    }

    function updateDashboard() {
        const today = new Date().toISOString().split('T')[0];
        const d = db[today] || {}; const getM = (t) => t ? parseInt(t.split(':')[0])*60 + parseInt(t.split(':')[1]) : 0;
        let tot = 0; if(d.s1 && d.e1) tot += (getM(d.e1) - getM(d.s1)); if(d.s2 && d.e2) tot += (getM(d.e2) - getM(d.s2));
        const h = (tot/60).toFixed(1);
        if(document.getElementById('ts-total')) document.getElementById('ts-total').innerText = h + ' ч';
        if(document.getElementById('home-hours')) document.getElementById('home-hours').innerText = h;
        const curM = new Date().getHours()*60 + new Date().getMinutes();
        let next = "--:--"; if(getM(d.e1) > curM) next = d.e1; else if(getM(d.e2) > curM) next = d.e2;
        if(document.getElementById('home-alarm')) document.getElementById('home-alarm').innerText = next;
    }

    function addTask() {
        const input = document.getElementById('task-input'); const prio = document.getElementById('task-priority').value;
        if(!input.value.trim()) return; if(!db[selectedDate]) db[selectedDate] = { tasks: [] };
        db[selectedDate].tasks.push({ text: input.value, priority: prio, done: false });
        input.value = ''; saveData(); renderTasks();
    }

    function renderTasks() {
        const list = document.getElementById('task-list'); if(!list) return;
        list.innerHTML = (db[selectedDate]?.tasks || []).map((t, i) => `
            <li class="flex items-center justify-between p-5 bg-white dark:bg-zinc-900 rounded-3xl border shadow-sm">
                <div class="flex items-center gap-4">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${i})" class="w-5 h-5 rounded-full text-primary">
                    <div><span class="text-[8px] uppercase font-bold text-primary opacity-50">${t.priority}</span><p class="text-sm ${t.done ? 'line-through opacity-30' : 'font-bold'}">${t.text}</p></div>
                </div>
                <button onclick="deleteTask(${i})" class="opacity-20 material-symbols-outlined">delete</button>
            </li>
        `).join('');
    }

    function toggleTask(i) { db[selectedDate].tasks[i].done = !db[selectedDate].tasks[i].done; saveData(); renderTasks(); if(document.getElementById('day-preview-card').classList.contains('hidden') === false) renderDayPreviewContent(); }
    function deleteTask(i) { db[selectedDate].tasks.splice(i,1); saveData(); renderTasks(); renderDayPreviewContent(); }

    function checkTaskRollover() {
        const today = new Date().toISOString().split('T')[0];
        Object.keys(db).forEach(date => {
            if(date < today && db[date].tasks) {
                db[date].tasks.forEach(t => {
                    if(!t.done && !t.rolled) {
                        if(!db[today]) db[today] = { tasks: [] };
                        db[today].tasks.push({ ...t, text: t.text + " (С вчера)" }); t.rolled = true;
                    }
                });
            }
        });
        saveData();
    }

    function toggleTheme() { document.documentElement.classList.toggle('dark'); }
    function updateClock() {
        const now = new Date();
        if(document.getElementById('home-clock')) document.getElementById('home-clock').innerText = now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('top-clock').innerText = now.toLocaleTimeString('ru-RU');
        document.getElementById('home-date').innerText = now.toLocaleDateString('ru-RU', {weekday:'long', day:'numeric', month:'long'});
        if (now.getSeconds() === 0) checkAlarms(now);
    }

    function checkAlarms(now) {
        const todayStr = now.toISOString().split('T')[0]; const d = db[todayStr]; if (!d) return;
        const cur = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        const check = (end, type) => {
            if (!end) return;
            const [h, m] = end.split(':'); let total = parseInt(h)*60 + parseInt(m) - 5;
            let target = Math.floor(total/60).toString().padStart(2,'0') + ":" + (total%60).toString().padStart(2,'0');
            if (cur === target) { audio.play(); alert(`🔔 До выхода 5 минут! (${end})`); }
        };
        check(d.e1); check(d.e2);
    }

    function renderCalendarStrip() {
        const box = document.getElementById('calendar-strip'); if(!box) return; box.innerHTML = '';
        const today = new Date(); const start = new Date(today); start.setDate(today.getDate() - today.getDay());
        for(let i = 0; i < 14; i++) {
            const d = new Date(start); d.setDate(start.getDate() + i); const dStr = d.toISOString().split('T')[0];
            const btn = document.createElement('button');
            btn.className = `flex-shrink-0 w-14 py-5 rounded-3xl flex flex-col items-center bg-white dark:bg-zinc-900 shadow-sm transition-all ${dStr === selectedDate ? 'active-day scale-110 shadow-lg' : 'opacity-40'}`;
            btn.innerHTML = `<span class="text-[8px] font-black uppercase mb-1">${d.toLocaleDateString('ru-RU',{weekday:'short'})}</span><span class="text-base font-black">${d.getDate()}</span>`;
            btn.onclick = () => { selectedDate = dStr; renderCalendarStrip(); loadDayData(); }; box.appendChild(btn);
        }
    }

    window.onload = () => {
        showSection('home');
        setInterval(updateClock, 1000);
        const affirmations = ["Ты сильнее, чем ты думаешь.", "Сегодня отличный день, чтобы начать новое.", "Твоя энергия безгранична.", "Маленькие шаги ведут к большим целям."];
        document.getElementById('affirmation-text').innerText = affirmations[Math.floor(Math.random()*affirmations.length)];
    };
</script>
</body>
</html>
