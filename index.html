<!DOCTYPE html>
<html class="light" lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Productivity Assistant</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7b5455",
                        "primary-light": "#ecbaba",
                        "surface-dark": "#0d0e0e",
                        "surface-light": "#faf9f9",
                        "container-dark": "#181a1a",
                        "container-light": "#f0eded"
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s, color 0.3s; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-day { background-color: #ecbaba !important; color: #7b5455 !important; font-weight: 800; transform: scale(1.05); }
        .dark .active-day { background-color: #ecbaba !important; color: #0d0e0e !important; }
    </style>
</head>
<body class="bg-surface-light text-slate-900 dark:bg-surface-dark dark:text-on-surface pb-32">

    <audio id="alarm-audio" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <!-- Header -->
    <header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-surface-dark/80 backdrop-blur-md flex justify-between items-center px-6 h-16 border-b dark:border-white/5">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary dark:text-primary-light">schedule</span>
            <h1 class="font-bold tracking-tight dark:text-white">Productivity App</h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-white/10">
                <span id="theme-icon" class="material-symbols-outlined">dark_mode</span>
            </button>
            <div id="clock" class="font-mono font-bold text-primary dark:text-primary-light">00:00</div>
        </div>
    </header>

    <main class="pt-20 px-6 max-w-2xl mx-auto space-y-6">
        
        <!-- Календарная лента -->
        <section>
            <div id="calendar-strip" class="flex gap-3 overflow-x-auto no-scrollbar py-4 px-1">
                <!-- Дни генерятся через JS -->
            </div>
        </section>

        <!-- Табель (Две смены: Утро и Вечер) -->
        <section class="bg-container-light dark:bg-container-dark p-6 rounded-3xl shadow-sm border dark:border-white/5">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-[10px] font-bold uppercase tracking-widest opacity-60">Рабочие смены</h2>
                <button onclick="applyMyPreset()" class="text-[10px] bg-primary text-white px-3 py-1.5 rounded-full font-bold">Загрузить мой график</button>
            </div>
            
            <div class="space-y-4">
                <!-- Утренняя смена -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold mb-1 opacity-60">УТРО: ВХОД</label>
                        <input type="time" id="start-1" onchange="saveDayData()" class="w-full bg-white dark:bg-surface-dark border-none rounded-xl">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold mb-1 opacity-60">УТРО: ВЫХОД</label>
                        <input type="time" id="end-1" onchange="saveDayData()" class="w-full bg-white dark:bg-surface-dark border-none rounded-xl">
                    </div>
                </div>
                <!-- Вечерняя смена -->
                <div class="grid grid-cols-2 gap-4 border-t dark:border-white/5 pt-4">
                    <div>
                        <label class="block text-[10px] font-bold mb-1 opacity-60">ВЕЧЕР: ВХОД</label>
                        <input type="time" id="start-2" onchange="saveDayData()" class="w-full bg-white dark:bg-surface-dark border-none rounded-xl">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold mb-1 opacity-60">ВЕЧЕР: ВЫХОД</label>
                        <input type="time" id="end-2" onchange="saveDayData()" class="w-full bg-white dark:bg-surface-dark border-none rounded-xl">
                    </div>
                </div>
            </div>

            <div class="mt-6 flex items-center justify-between bg-primary-light/30 dark:bg-primary-light/10 p-5 rounded-2xl">
                <div>
                    <p class="text-[10px] font-bold uppercase opacity-60">Всего часов:</p>
                    <p class="text-3xl font-black text-primary dark:text-primary-light" id="total-hours">0.0</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-bold uppercase text-primary dark:text-primary-light">Будильник (за 5 мин)</p>
                    <div class="flex items-center justify-end gap-2">
                        <span class="material-symbols-outlined text-sm">notifications_active</span>
                        <p class="text-xl font-bold" id="alarm-time-display">--:--</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Задачи -->
        <section class="bg-container-light dark:bg-container-dark p-6 rounded-3xl shadow-sm">
            <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                Задачи на день <span id="task-count" class="text-xs bg-primary text-white px-2 py-0.5 rounded-full">0</span>
            </h3>
            <div class="flex gap-2 mb-4">
                <input type="text" id="task-input" placeholder="Что нужно сделать?" class="flex-1 bg-white dark:bg-surface-dark border-none rounded-2xl focus:ring-primary text-sm">
                <button id="add-task-btn" class="bg-primary text-white w-12 h-12 rounded-2xl flex items-center justify-center hover:scale-105 active:scale-90 transition-all">
                    <span class="material-symbols-outlined">add</span>
                </button>
            </div>
            <ul id="task-list" class="space-y-2"></ul>
        </section>

        <!-- Заметки -->
        <section>
            <textarea id="notes-input" oninput="saveDayData()" placeholder="Личные заметки..." class="w-full h-24 bg-container-light dark:bg-container-dark border-none rounded-3xl p-4 text-sm focus:ring-primary"></textarea>
        </section>

        <!-- Рандомный факт -->
        <section class="bg-primary/5 dark:bg-white/5 p-5 rounded-3xl border border-primary/10 flex gap-4 items-start">
            <span class="material-symbols-outlined text-primary dark:text-primary-light">tips_and_updates</span>
            <p id="fact-text" class="text-xs italic leading-relaxed opacity-80">Загрузка интересного факта...</p>
        </section>

    </main>

    <!-- Навигация -->
    <nav class="fixed bottom-0 left-0 w-full h-20 bg-white/90 dark:bg-surface-dark/90 backdrop-blur-md flex justify-around items-center border-t dark:border-white/5 z-50">
        <button class="flex flex-col items-center text-primary dark:text-primary-light">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] font-bold mt-1 uppercase">Главная</span>
        </button>
        <button class="flex flex-col items-center text-gray-400">
            <span class="material-symbols-outlined">equalizer</span>
            <span class="text-[10px] font-bold mt-1 uppercase">Табель</span>
        </button>
        <button class="flex flex-col items-center text-gray-400">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-[10px] font-bold mt-1 uppercase">Настройки</span>
        </button>
    </nav>

    <script>
        let selectedDate = new Date().toISOString().split('T')[0];
        let db = JSON.parse(localStorage.getItem('productivity_app_db')) || {};

        // 1. ПЕРЕКЛЮЧЕНИЕ ТЕМЫ
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.innerText = 'dark_mode';
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                icon.innerText = 'light_mode';
                localStorage.setItem('theme', 'dark');
            }
        }

        // 2. КАЛЕНДАРЬ
        function initCalendar() {
            const strip = document.getElementById('calendar-strip');
            strip.innerHTML = '';
            const today = new Date();
            for (let i = -7; i < 14; i++) {
                const date = new Date();
                date.setDate(today.getDate() + i);
                const dateStr = date.toISOString().split('T')[0];
                const dayName = date.toLocaleDateString('ru-RU', { weekday: 'short' });
                const dayNum = date.getDate();

                const btn = document.createElement('button');
                btn.className = `flex flex-col items-center justify-center min-w-[55px] py-4 rounded-2xl bg-container-light dark:bg-container-dark transition-all ${dateStr === selectedDate ? 'active-day shadow-lg' : 'opacity-60'}`;
                btn.innerHTML = `<span class="text-[9px] uppercase mb-1">${dayName}</span><span class="text-lg font-black">${dayNum}</span>`;
                btn.onclick = () => { selectedDate = dateStr; initCalendar(); loadDayData(); };
                strip.appendChild(btn);
            }
        }

        // 3. ЧАСЫ И БУДИЛЬНИК
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
            
            // Проверка будильника (для сегодняшнего дня)
            const todayStr = now.toISOString().split('T')[0];
            const alarmTime = document.getElementById('alarm-time-display').innerText;
            const currentTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

            if (currentTime === alarmTime && now.getSeconds() === 0 && selectedDate === todayStr) {
                document.getElementById('alarm-audio').play();
                alert("Внимание! До конца работы осталось 5 минут.");
            }
        }

        // 4. ДАННЫЕ ДНЯ И ТАБЕЛЬ
        function loadDayData() {
            const data = db[selectedDate] || { s1: '', e1: '', s2: '', e2: '', tasks: [], notes: '' };
            document.getElementById('start-1').value = data.s1 || '';
            document.getElementById('end-1').value = data.e1 || '';
            document.getElementById('start-2').value = data.s2 || '';
            document.getElementById('end-2').value = data.e2 || '';
            document.getElementById('notes-input').value = data.notes || '';
            renderTasks(data.tasks || []);
            calculateHours();
        }

        function saveDayData() {
            if (!db[selectedDate]) db[selectedDate] = {};
            db[selectedDate].s1 = document.getElementById('start-1').value;
            db[selectedDate].e1 = document.getElementById('end-1').value;
            db[selectedDate].s2 = document.getElementById('start-2').value;
            db[selectedDate].e2 = document.getElementById('end-2').value;
            db[selectedDate].notes = document.getElementById('notes-input').value;
            localStorage.setItem('productivity_app_db', JSON.stringify(db));
            calculateHours();
        }

        function calculateHours() {
            const s1 = document.getElementById('start-1').value;
            const e1 = document.getElementById('end-1').value;
            const s2 = document.getElementById('start-2').value;
            const e2 = document.getElementById('end-2').value;

            let totalMinutes = 0;
            let lastExit = null;

            function getMin(time) {
                if(!time) return null;
                const [h, m] = time.split(':');
                return parseInt(h) * 60 + parseInt(m);
            }

            const ms1 = getMin(s1), me1 = getMin(e1), ms2 = getMin(s2), me2 = getMin(e2);

            if (ms1 !== null && me1 !== null) totalMinutes += (me1 - ms1);
            if (ms2 !== null && me2 !== null) totalMinutes += (me2 - ms2);
            
            // Итого часов
            document.getElementById('total-hours').innerText = (totalMinutes / 60).toFixed(1);

            // Будильник за 5 мин до последнего выхода
            lastExit = me2 || me1;
            if (lastExit) {
                const alarmMin = lastExit - 5;
                const ah = Math.floor(alarmMin / 60).toString().padStart(2, '0');
                const am = (alarmMin % 60).toString().padStart(2, '0');
                document.getElementById('alarm-time-display').innerText = `${ah}:${am}`;
            } else {
                document.getElementById('alarm-time-display').innerText = '--:--';
            }
        }

        // 5. ПРЕСЕТ ИЗ ВАШЕГО ТАБЕЛЯ (Евгения)
        function applyMyPreset() {
            const day = new Date(selectedDate).getDay(); // 0-Вс, 1-Пн...
            // Данные из вашего фото
            const presets = {
                0: { s1: '07:00', e1: '17:00' }, // Воскресенье
                1: { s2: '13:59', e2: '21:59' }, // Понедельник
                3: { s2: '12:59', e2: '22:59' }, // Среда
                4: { s1: '07:00', e1: '09:00', s2: '13:59', e2: '23:59' } // Четверг
            };
            
            const p = presets[day] || { s1: '09:00', e1: '18:00' };
            document.getElementById('start-1').value = p.s1 || '';
            document.getElementById('end-1').value = p.e1 || '';
            document.getElementById('start-2').value = p.s2 || '';
            document.getElementById('end-2').value = p.e2 || '';
            saveDayData();
        }

        // 6. ЗАДАЧИ
        function renderTasks(tasks) {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            tasks.forEach((t, i) => {
                const li = document.createElement('li');
                li.className = "bg-white dark:bg-surface-dark p-3 rounded-2xl flex items-center justify-between shadow-sm";
                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${i})" class="rounded-full border-gray-300 text-primary focus:ring-0 w-5 h-5">
                        <span class="text-sm ${t.done ? 'line-through opacity-40' : ''}">${t.text}</span>
                    </div>
                    <button onclick="deleteTask(${i})" class="text-gray-400 hover:text-red-500 transition-colors">
                        <span class="material-symbols-outlined text-lg">close</span>
                    </button>
                `;
                list.appendChild(li);
            });
            document.getElementById('task-count').innerText = tasks.length;
        }

        document.getElementById('add-task-btn').onclick = function() {
            const input = document.getElementById('task-input');
            const val = input.value.trim();
            if (!val) return;
            if (!db[selectedDate]) db[selectedDate] = { tasks: [] };
            if (!db[selectedDate].tasks) db[selectedDate].tasks = [];
            db[selectedDate].tasks.push({ text: val, done: false });
            input.value = '';
            saveDayData();
            renderTasks(db[selectedDate].tasks);
        };

        function toggleTask(i) {
            db[selectedDate].tasks[i].done = !db[selectedDate].tasks[i].done;
            saveDayData();
            renderTasks(db[selectedDate].tasks);
        }

        function deleteTask(i) {
            db[selectedDate].tasks.splice(i, 1);
            saveDayData();
            renderTasks(db[selectedDate].tasks);
        }

        // 7. ФАКТЫ
        const facts = [
            "Мозг потребляет 20% всей энергии тела.",
            "Для формирования привычки нужно в среднем 66 дней.",
            "Синий цвет повышает креативность.",
            "Пчёлы могут считать до четырёх.",
            "Зевота помогает охладить мозг."
        ];
        function showFact() {
            document.getElementById('fact-text').innerText = facts[Math.floor(Math.random() * facts.length)];
        }

        // ПРИ ЗАГРУЗКЕ
        window.onload = () => {
            if (localStorage.getItem('theme') === 'dark') toggleTheme();
            initCalendar();
            loadDayData();
            setInterval(updateClock, 1000);
            showFact();
        };
    </script>
</body>
</html>
