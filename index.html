<!DOCTYPE html>
<html class="light" lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Productivity Assistant</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7b5455",
                        "primary-fixed-dim": "#ecbaba",
                        "surface": "#faf9f9",
                        "surface-dark": "#0d0e0e",
                        "surface-container": "#f5f3f3",
                        "surface-container-dark": "#181a1a",
                        "on-surface": "#1b1c1c",
                        "on-surface-dark": "#e4e6e6",
                        "tertiary": "#486456",
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; }
        .editorial-gradient { background: linear-gradient(135deg, #7B5455 0%, #F4C2C2 100%); }
        .hidden-section { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-nav { background-color: #ecbaba !important; color: #1b1c1c !important; border-radius: 12px; }
        .active-day { background-color: #7b5455 !important; color: white !important; transform: scale(1.1); }
        body { transition: background 0.3s, color 0.3s; }
    </style>
</head>
<body class="bg-surface dark:bg-surface-dark text-on-surface dark:text-on-surface-dark font-body">

<audio id="alarm-audio" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<!-- AppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-surface-dark/80 backdrop-blur-xl shadow-sm border-b dark:border-white/5">
    <div class="flex items-center justify-between px-6 py-4">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim">schedule</span>
            <h1 id="header-title" class="text-lg font-extrabold tracking-tight uppercase italic">Главная</h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="material-symbols-outlined opacity-60">contrast</button>
            <div id="top-clock" class="font-mono font-bold text-primary dark:text-primary-fixed-dim text-sm">00:00</div>
        </div>
    </div>
</header>

<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">

    <!-- SECTION: HOME -->
    <div id="section-home" class="space-y-8">
        <section class="relative overflow-hidden rounded-3xl bg-surface-container dark:bg-surface-container-dark p-8 shadow-sm">
            <div class="relative z-10 space-y-4">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span class="text-[10px] font-bold tracking-widest opacity-50 uppercase">Sync Active</span>
                </div>
                <h2 id="home-clock" class="text-7xl font-black tracking-tighter">00:00</h2>
                <div class="flex justify-between items-end">
                    <p class="text-sm opacity-60" id="home-date">Загрузка даты...</p>
                    <div class="text-right">
                        <p class="text-[10px] font-bold uppercase opacity-40">Часы сегодня</p>
                        <p id="home-hours" class="text-2xl font-black text-primary dark:text-primary-fixed-dim">0.0</p>
                    </div>
                </div>
            </div>
            <div class="absolute -right-20 -top-20 w-64 h-64 editorial-gradient opacity-10 rounded-full blur-3xl"></div>
        </section>

        <section class="grid grid-cols-2 gap-4">
            <div onclick="showSection('tasks')" class="bg-surface-container dark:bg-surface-container-dark p-5 rounded-2xl cursor-pointer">
                <span class="material-symbols-outlined text-primary mb-2">checklist</span>
                <p class="text-xs font-bold uppercase opacity-40">Задачи</p>
                <p id="home-task-count" class="text-xl font-bold">0 активных</p>
            </div>
            <div onclick="showSection('timesheet')" class="bg-primary text-white p-5 rounded-2xl cursor-pointer">
                <span class="material-symbols-outlined mb-2">alarm</span>
                <p class="text-xs font-bold uppercase opacity-60">Будильник</p>
                <p id="home-alarm" class="text-xl font-bold">--:--</p>
            </div>
        </section>

        <!-- Fact -->
        <section class="bg-tertiary/5 border border-tertiary/10 p-6 rounded-3xl">
            <div class="flex items-center gap-2 mb-2 text-tertiary">
                <span class="material-symbols-outlined text-sm">lightbulb</span>
                <span class="text-[10px] font-bold uppercase">Знаете ли вы?</span>
            </div>
            <p id="fact-display" class="text-sm italic opacity-80 leading-relaxed">Загрузка факта...</p>
        </section>
    </div>

    <!-- SECTION: TIMESHEET -->
    <div id="section-timesheet" class="hidden-section space-y-6">
        <div class="bg-surface-container dark:bg-surface-container-dark p-6 rounded-3xl space-y-6">
            <div class="flex justify-between items-center">
                <h3 class="font-bold uppercase text-xs opacity-50">Учет времени (2 смены)</h3>
                <button onclick="applyPreset()" class="bg-primary text-white text-[10px] px-3 py-1 rounded-full font-bold">МОЙ ГРАФИК</button>
            </div>
            
            <div class="grid grid-cols-1 gap-6">
                <div class="space-y-3 p-4 bg-black/5 dark:bg-white/5 rounded-2xl">
                    <p class="text-[10px] font-bold opacity-40 uppercase">Смена 1 (Утро)</p>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="time" id="ts-s1" onchange="sync()" class="bg-transparent border-b border-primary/20 text-xl font-bold p-1 w-full focus:ring-0">
                        <input type="time" id="ts-e1" onchange="sync()" class="bg-transparent border-b border-primary/20 text-xl font-bold p-1 w-full focus:ring-0">
                    </div>
                </div>
                <div class="space-y-3 p-4 bg-black/5 dark:bg-white/5 rounded-2xl">
                    <p class="text-[10px] font-bold opacity-40 uppercase">Смена 2 (Вечер)</p>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="time" id="ts-s2" onchange="sync()" class="bg-transparent border-b border-primary/20 text-xl font-bold p-1 w-full focus:ring-0">
                        <input type="time" id="ts-e2" onchange="sync()" class="bg-transparent border-b border-primary/20 text-xl font-bold p-1 w-full focus:ring-0">
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between p-4 bg-primary/10 rounded-2xl">
                <span class="text-sm font-bold opacity-60 uppercase tracking-widest">Итого за день</span>
                <span id="ts-total" class="text-3xl font-black text-primary">0.0 ч</span>
            </div>
        </div>
    </div>

    <!-- SECTION: TASKS -->
    <div id="section-tasks" class="hidden-section space-y-6">
        <div id="calendar-strip" class="flex gap-2 overflow-x-auto no-scrollbar py-2"></div>
        
        <div class="flex gap-2">
            <input type="text" id="task-input" placeholder="Новая задача..." class="flex-1 rounded-2xl border-none bg-surface-container dark:bg-surface-container-dark p-4 focus:ring-primary text-sm">
            <button onclick="addTask()" class="bg-primary text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-all">
                <span class="material-symbols-outlined">add</span>
            </button>
        </div>
        
        <ul id="task-list" class="space-y-3"></ul>
    </div>

    <!-- SECTION: NOTES -->
    <div id="section-notes" class="hidden-section">
        <textarea id="notes-area" oninput="sync()" placeholder="Напишите здесь свои мысли..." class="w-full h-80 rounded-3xl border-none bg-surface-container dark:bg-surface-container-dark p-6 focus:ring-primary text-sm leading-relaxed"></textarea>
    </div>

</main>

<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 w-full h-20 bg-white/80 dark:bg-surface-dark/80 backdrop-blur-xl flex justify-around items-center px-4 border-t dark:border-white/5 z-50">
    <button id="nav-home" onclick="showSection('home')" class="flex flex-col items-center p-3">
        <span class="material-symbols-outlined">home</span>
        <span class="text-[9px] font-bold uppercase mt-1">Home</span>
    </button>
    <button id="nav-timesheet" onclick="showSection('timesheet')" class="flex flex-col items-center p-3">
        <span class="material-symbols-outlined">timer</span>
        <span class="text-[9px] font-bold uppercase mt-1">T-Sheet</span>
    </button>
    <button id="nav-tasks" onclick="showSection('tasks')" class="flex flex-col items-center p-3">
        <span class="material-symbols-outlined">checklist</span>
        <span class="text-[9px] font-bold uppercase mt-1">Tasks</span>
    </button>
    <button id="nav-notes" onclick="showSection('notes')" class="flex flex-col items-center p-3">
        <span class="material-symbols-outlined">description</span>
        <span class="text-[9px] font-bold uppercase mt-1">Notes</span>
    </button>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('prod_db')) || {};
    let selectedDate = new Date().toISOString().split('T')[0];
    const alarmAudio = document.getElementById('alarm-audio');

    // 1. НАВИГАЦИЯ
    function showSection(id) {
        document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden-section'));
        document.getElementById('section-' + id).classList.remove('hidden-section');
        
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-nav'));
        document.getElementById('nav-' + id).classList.add('active-nav');
        
        const titles = {home: 'Главная', timesheet: 'Табель', tasks: 'Задачи', notes: 'Заметки'};
        document.getElementById('header-title').innerText = titles[id];
        
        if (id === 'tasks') renderCalendar();
        loadDayData();
    }

    // 2. ТЕМА
    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }

    // 3. ЧАСЫ И БУДИЛЬНИКИ
    function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
        const fullTimeStr = now.toLocaleTimeString('ru-RU');
        
        if(document.getElementById('home-clock')) document.getElementById('home-clock').innerText = timeStr;
        document.getElementById('top-clock').innerText = fullTimeStr;
        document.getElementById('home-date').innerText = now.toLocaleDateString('ru-RU', {weekday:'long', day:'numeric', month:'long'});

        // Логика будильника (каждую минуту)
        if (now.getSeconds() === 0) {
            checkAlarms(now);
        }
    }

    function checkAlarms(now) {
        const today = now.toISOString().split('T')[0];
        const dayData = db[today];
        if (!dayData) return;

        const currentHHMM = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        
        const triggerAlarm = (endTime) => {
            if (!endTime) return;
            const [h, m] = endTime.split(':');
            const endTotal = parseInt(h) * 60 + parseInt(m);
            const alarmTotal = endTotal - 5;
            const ah = Math.floor(alarmTotal / 60).toString().padStart(2, '0');
            const am = (alarmTotal % 60).toString().padStart(2, '0');
            
            if (currentHHMM === `${ah}:${am}`) {
                alarmAudio.play();
                alert("🔔 Осталось 5 минут до конца смены!");
            }
        };

        triggerAlarm(dayData.e1);
        triggerAlarm(dayData.e2);
    }

    // 4. ТАБЕЛЬ И ДАННЫЕ
    function sync() {
        if (!db[selectedDate]) db[selectedDate] = { tasks: [], notes: '', s1:'', e1:'', s2:'', e2:'' };
        let d = db[selectedDate];
        
        d.s1 = document.getElementById('ts-s1').value;
        d.e1 = document.getElementById('ts-e1').value;
        d.s2 = document.getElementById('ts-s2').value;
        d.e2 = document.getElementById('ts-e2').value;
        d.notes = document.getElementById('notes-area').value;
        
        localStorage.setItem('prod_db', JSON.stringify(db));
        calculateDayTotal();
        updateHomeStatus();
    }

    function loadDayData() {
        const d = db[selectedDate] || { s1:'', e1:'', s2:'', e2:'', tasks: [], notes: '' };
        document.getElementById('ts-s1').value = d.s1 || '';
        document.getElementById('ts-e1').value = d.e1 || '';
        document.getElementById('ts-s2').value = d.s2 || '';
        document.getElementById('ts-e2').value = d.e2 || '';
        document.getElementById('notes-area').value = d.notes || '';
        renderTasks();
        calculateDayTotal();
    }

    function calculateDayTotal() {
        const d = db[selectedDate] || {};
        const getM = (t) => t ? parseInt(t.split(':')[0])*60 + parseInt(t.split(':')[1]) : 0;
        
        let total = 0;
        if(d.s1 && d.e1) total += (getM(d.e1) - getM(d.s1));
        if(d.s2 && d.e2) total += (getM(d.e2) - getM(d.s2));
        
        const hours = (total / 60).toFixed(1);
        document.getElementById('ts-total').innerText = hours + ' ч';
        if (selectedDate === new Date().toISOString().split('T')[0]) {
            document.getElementById('home-hours').innerText = hours;
            document.getElementById('home-alarm').innerText = d.e2 || d.e1 || '--:--';
        }
    }

    // 5. ЗАДАЧИ И КАЛЕНДАРЬ
    function renderCalendar() {
