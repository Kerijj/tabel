<!DOCTYPE html>
<html class="dark" lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Productivity Assistant</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ecbaba",
                        "on-primary": "#593738",
                        "primary-container": "#613d3e",
                        "surface": "#0d0e0e",
                        "surface-container": "#181a1a",
                        "surface-container-high": "#232627",
                        "on-surface": "#e4e6e6",
                        "on-surface-variant": "#a9abab",
                        "secondary": "#a69b9b",
                        "outline": "#737676"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"]
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d0e0e; color: #e4e6e6; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-nav { background: rgba(24, 26, 26, 0.8); backdrop-filter: blur(20px); }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.8); }
    </style>
</head>
<body class="pb-32">

    <!-- Аудио для будильника -->
    <audio id="alarm-audio" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <!-- Header -->
    <header class="fixed top-0 w-full z-50 bg-surface flex justify-between items-center px-6 h-16 border-b border-surface-container-high">
        <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-primary">schedule</span>
            <h1 class="text-xl font-bold tracking-tighter">Productivity Assistant</h1>
        </div>
        <div id="clock" class="text-primary font-mono font-bold text-lg">00:00:00</div>
    </header>

    <main class="pt-24 px-6 max-w-2xl mx-auto space-y-10">
        
        <!-- Секция Табеля и Будильника -->
        <section class="bg-surface-container p-6 rounded-2xl border border-surface-container-high">
            <h2 class="text-primary text-[10px] font-bold uppercase tracking-[0.2em] mb-4">Учет времени и Будильник</h2>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-xs text-secondary mb-1 uppercase">Начало</label>
                    <input type="time" id="start-time" value="09:00" class="w-full bg-surface-container-high border-none rounded-lg text-on-surface focus:ring-primary">
                </div>
                <div>
                    <label class="block text-xs text-secondary mb-1 uppercase">Конец</label>
                    <input type="time" id="end-time" value="18:00" class="w-full bg-surface-container-high border-none rounded-lg text-on-surface focus:ring-primary">
                </div>
            </div>
            <div class="flex items-center justify-between bg-primary-container/20 p-4 rounded-xl">
                <div>
                    <p class="text-xs text-secondary">Отработано (за вычетом 1ч обеда):</p>
                    <p class="text-2xl font-bold text-primary" id="total-hours">0 ч 0 мин</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-primary font-bold uppercase">Будильник (за 5 мин)</p>
                    <p class="text-lg text-on-surface" id="alarm-time-display">17:55</p>
                </div>
            </div>
        </section>

        <!-- Секция Задач -->
        <section>
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">Задачи на день</h3>
                <span id="task-count" class="text-xs bg-primary text-on-primary px-2 py-1 rounded-full font-bold">0</span>
            </div>
            <div class="flex gap-2 mb-4">
                <input type="text" id="task-input" placeholder="Что нужно сделать?" class="flex-1 bg-surface-container border-none rounded-xl text-on-surface focus:ring-primary">
                <button onclick="addTask()" class="bg-primary text-on-primary px-4 rounded-xl font-bold active:scale-95 transition-transform">+</button>
            </div>
            <ul id="task-list" class="space-y-3">
                <!-- Задачи появятся здесь -->
            </ul>
        </section>

        <!-- Секция Заметок -->
        <section>
            <h3 class="text-xl font-bold mb-4">Заметки</h3>
            <textarea id="notes-input" oninput="saveNotes()" placeholder="Ваши мысли здесь..." class="w-full h-32 bg-surface-container border-none rounded-2xl text-on-surface focus:ring-primary p-4 mb-4"></textarea>
        </section>

        <!-- Рандомный факт -->
        <section class="bg-primary/10 border border-primary/20 p-6 rounded-2xl relative overflow-hidden group">
            <span class="material-symbols-outlined absolute -right-4 -bottom-4 text-primary opacity-10 text-8xl">lightbulb</span>
            <h4 class="text-primary text-[10px] font-bold uppercase tracking-widest mb-2">Знаете ли вы?</h4>
            <p id="fact-text" class="text-on-surface italic leading-relaxed relative z-10">Загрузка факта...</p>
            <button onclick="displayFact()" class="mt-4 text-xs text-primary font-bold hover:underline relative z-10">СЛЕДУЮЩИЙ ФАКТ</button>
        </section>

    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 w-full h-20 glass-nav flex justify-around items-center px-4 rounded-t-3xl border-t border-white/5">
        <button class="flex flex-col items-center text-primary">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] uppercase font-bold mt-1">Главная</span>
        </button>
        <button class="flex flex-col items-center text-secondary opacity-50">
            <span class="material-symbols-outlined">analytics</span>
            <span class="text-[10px] uppercase font-bold mt-1">Отчеты</span>
        </button>
    </nav>

    <script>
        // 1. ЛОГИКА ЧАСОВ И БУДИЛЬНИКА
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ru-RU');
            document.getElementById('clock').innerText = timeStr;

            checkAlarm(now);
        }

        function calculateHours() {
            const start = document.getElementById('start-time').value;
            const end = document.getElementById('end-time').value;
            
            if (start && end) {
                const s = start.split(':');
                const e = end.split(':');
                let diff = (new Date(0,0,0,e[0],e[1]) - new Date(0,0,0,s[0],s[1])) / 1000 / 60;
                
                diff -= 60; // Вычитаем 1 час (60 мин) обеда
                if (diff < 0) diff = 0;

                const hours = Math.floor(diff / 60);
                const mins = diff % 60;
                document.getElementById('total-hours').innerText = `${hours} ч ${mins} мин`;

                // Рассчитываем время будильника (за 5 минут до конца)
                let alarmMins = parseInt(e[1]) - 5;
                let alarmHours = parseInt(e[0]);
                if (alarmMins < 0) {
                    alarmMins += 60;
                    alarmHours -= 1;
                }
                const alarmStr = `${String(alarmHours).padStart(2, '0')}:${String(alarmMins).padStart(2, '0')}`;
                document.getElementById('alarm-time-display').innerText = alarmStr;
            }
        }

        let alarmTriggered = false;
        function checkAlarm(now) {
            const alarmTime = document.getElementById('alarm-time-display').innerText;
            const currentTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

            if (currentTime === alarmTime && !alarmTriggered) {
                document.getElementById('alarm-audio').play();
                alert("Пора собираться! До конца работы осталось 5 минут.");
                alarmTriggered = true;
            }
            
            // Сброс триггера через минуту
            if (currentTime !== alarmTime) alarmTriggered = false;
        }

        // 2. ЛОГИКА ЗАДАЧ
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = "bg-surface-container-high p-4 rounded-xl flex items-center justify-between group";
                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${index})" class="rounded border-primary text-primary bg-transparent">
                        <span class="${task.done ? 'line-through text-secondary' : ''}">${task.text}</span>
                    </div>
                    <button onclick="deleteTask(${index})" class="text-secondary opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="material-symbols-outlined text-sm">delete</span>
                    </button>
                `;
                list.appendChild(li);
            });
            document.getElementById('task-count').innerText = tasks.length;
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function addTask() {
            const input = document.getElementById('task-input');
            if (input.value.trim()) {
                tasks.push({ text: input.value, done: false });
                input.value = '';
                renderTasks();
            }
        }

        function toggleTask(index) {
            tasks[index].done = !tasks[index].done;
            renderTasks();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            renderTasks();
        }

        // 3. ЗАМЕТКИ
        function saveNotes() {
            const text = document.getElementById('notes-input').value;
            localStorage.setItem('notes', text);
        }

        // 4. РАНДОМНЫЕ ФАКТЫ
        const facts = [
            "Пчёлы могут распознавать человеческие лица.",
            "Мозг вырабатывает достаточно электричества, чтобы зажечь небольшую лампочку.",
            "Шоколад был когда-то валютой в империи Майя.",
            "Осьминоги имеют три сердца и голубую кровь.",
            "Клубника — это не ягода, а банан — да."
        ];

        function displayFact() {
            const fact = facts[Math.floor(Math.random() * facts.length)];
            document.getElementById('fact-text').innerText = fact;
        }

        // ИНИЦИАЛИЗАЦИЯ ПРИ ЗАГРУЗКЕ
        window.onload = () => {
            setInterval(updateClock, 1000);
            document.getElementById('start-time').addEventListener('change', calculateHours);
            document.getElementById('end-time').addEventListener('change', calculateHours);
            
            document.getElementById('notes-input').value = localStorage.getItem('notes') || '';
            
            calculateHours();
            renderTasks();
            displayFact();
        };
    </script>
</body>
</html>
