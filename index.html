<!DOCTYPE html>
<html class="light" lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Productivity Assistant</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-fixed-dim": "#ecbaba", "on-error": "#ffffff", "on-secondary-fixed": "#1b1c1c",
                        "on-primary-container": "#734e4e", "surface-container-low": "#f5f3f3", "surface-variant": "#e3e2e2",
                        "on-surface-variant": "#504444", "secondary": "#5e5e5e", "primary": "#7b5455",
                        "tertiary-fixed-dim": "#afcebc", "on-background": "#1b1c1c", "error-container": "#ffdad6",
                        "surface": "#faf9f9", "surface-bright": "#faf9f9", "outline-variant": "#d4c2c2",
                        "on-primary": "#ffffff", "on-primary-fixed-variant": "#613d3e", "on-tertiary": "#ffffff",
                        "tertiary": "#486456", "secondary-fixed": "#e3e2e2", "on-error-container": "#93000a",
                        "on-tertiary-container": "#415d4f", "surface-tint": "#7b5455", "secondary-container": "#e3e2e2",
                        "on-tertiary-fixed-variant": "#314c3f", "inverse-on-surface": "#f2f0f0", "secondary-fixed-dim": "#c7c6c6",
                        "surface-container-lowest": "#ffffff", "inverse-surface": "#303031", "tertiary-container": "#b6d5c3",
                        "tertiary-fixed": "#caead7", "surface-container-high": "#e9e8e8", "on-primary-fixed": "#2f1314",
                        "surface-dim": "#dbdad9", "outline": "#827473", "on-tertiary-fixed": "#042015",
                        "on-secondary": "#ffffff", "on-surface": "#1b1c1c", "primary-fixed": "#ffdad9",
                        "on-secondary-container": "#646464", "on-secondary-fixed-variant": "#464747", "error": "#ba1a1a",
                        "background": "#faf9f9", "primary-container": "#f4c2c2", "surface-container-highest": "#e3e2e2",
                        "inverse-primary": "#ecbaba", "surface-container": "#efeded"
                    },
                    fontFamily: { "headline": ["Plus Jakarta Sans"], "body": ["Plus Jakarta Sans"] }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; display: inline-block; line-height: 1; }
        .editorial-gradient { background: linear-gradient(135deg, #7B5455 0%, #F4C2C2 100%); }
        .active-nav { background-color: #F4C2C2 !important; color: #1B1C1C !important; }
        .dark .active-nav { background-color: #7B5455 !important; color: #FAF9F9 !important; }
        .hidden-section { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-day { background-color: #F4C2C2 !important; transform: scale(1.1); font-weight: bold; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container">

<audio id="alarm-audio" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<!-- AppBar -->
<header class="fixed top-0 w-full z-50 bg-[#FAF9F9]/80 dark:bg-[#1B1C1C]/80 backdrop-blur-xl shadow-sm">
    <div class="flex items-center justify-between px-6 py-4">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-[#7B5455]">schedule</span>
            <h1 id="page-title" class="font-headline text-xl font-extrabold tracking-tight">Главная</h1>
        </div>
        <button onclick="toggleTheme()" class="material-symbols-outlined text-secondary">contrast</button>
    </div>
</header>

<main class="pt-24 pb-32 px-6 max-w-5xl mx-auto">
    
    <!-- РАЗДЕЛ: ГЛАВНАЯ -->
    <div id="section-home" class="space-y-12">
        <section class="relative overflow-hidden rounded-xl bg-surface-container-low p-8 shadow-sm">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 relative z-10">
                <div>
                    <div class="flex items-center gap-2 mb-2">
                        <span class="w-2 h-2 rounded-full bg-tertiary"></span>
                        <span class="text-[10px] font-bold tracking-widest text-secondary uppercase">СИНХРОНИЗАЦИЯ: ОК</span>
                    </div>
                    <h2 id="main-clock" class="font-headline text-7xl md:text-8xl font-extrabold tracking-tighter text-on-surface">00:00</h2>
                    <p class="text-sm font-medium text-secondary mt-2 flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">alarm</span>
                        Ближайший выход: <span id="next-alarm-display">--:--</span>
                    </p>
                </div>
                <div class="flex flex-col items-start md:items-end">
                    <span id="current-day-name" class="text-xl font-bold text-primary">--</span>
                    <span id="current-date-full" class="text-sm text-secondary">--</span>
                </div>
            </div>
            <div class="absolute -right-16 -top-16 w-64 h-64 editorial-gradient opacity-10 rounded-full blur-3xl"></div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 bg-surface-container-lowest p-6 rounded-xl shadow-sm border border-black/5">
                <h3 class="font-headline text-lg font-bold mb-4">Статус задач</h3>
                <div id="home-tasks-preview" class="space-y-3 opacity-60 italic text-sm text-center py-4">Нет задач на сегодня</div>
                <div class="mt-8">
                    <div class="h-2 w-full bg-surface-container-high rounded-full overflow-hidden">
                        <div id="home-progress-bar" class="h-full editorial-gradient w-0 rounded-full transition-all duration-500"></div>
                    </div>
                </div>
            </div>
            <div class="bg-primary text-on-primary p-6 rounded-xl shadow-lg flex flex-col justify-between">
                <span class="material-symbols-outlined mb-4">timer</span>
                <h3 class="text-lg font-bold">Сегодня</h3>
                <p class="text-4xl font-extrabold" id="home-total-hours">0ч</p>
                <button onclick="showSection('timesheet')" class="mt-4 w-full py-2 bg-primary-container text-on-primary-container rounded-xl text-xs font-bold">ОТКРЫТЬ ТАБЕЛЬ</button>
            </div>
        </section>

        <section id="fact-card" class="bg-tertiary-container/30 border border-tertiary/10 p-8 rounded-xl flex flex-col md:flex-row gap-8 items-center">
            <div class="flex-1">
                <div class="flex items-center gap-2 mb-4 text-tertiary">
                    <span class="material-symbols-outlined">lightbulb</span>
                    <h3 class="font-headline text-sm font-bold uppercase tracking-widest">Факт дня</h3>
                </div>
                <blockquote id="fact-text" class="text-xl font-bold leading-snug italic opacity-80">Загрузка...</blockquote>
                <button onclick="refreshFact()" class="mt-6 text-xs font-bold text-tertiary hover:underline">ЕЩЕ ФАКТ</button>
            </div>
        </section>
    </div>

    <!-- РАЗДЕЛ: ТАБЕЛЬ -->
    <div id="section-timesheet" class="hidden-section space-y-6">
        <div class="bg-surface-container-low p-6 rounded-2xl space-y-6 shadow-sm border border-black/5">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-primary">Настройка смен</h2>
                <button onclick="applyPreset()" class="text-[10px] bg-primary text-white px-3 py-1 rounded-full">МОЙ ГРАФИК</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-4 p-4 bg-white/50 rounded-xl">
                    <p class="text-[10px] font-bold opacity-50 uppercase">Смена 1</p>
                    <input type="time" id="ts-s1" onchange="syncData()" class="w-full border-none rounded-lg bg-surface">
                    <input type="time" id="ts-e1" onchange="syncData()" class="w-full border-none rounded-lg bg-surface">
                </div>
                <div class="space-y-4 p-4 bg-white/50 rounded-xl">
                    <p class="text-[10px] font-bold opacity-50 uppercase">Смена 2</p>
                    <input type="time" id="ts-s2" onchange="syncData()" class="w-full border-none rounded-lg bg-surface">
                    <input type="time" id="ts-e2" onchange="syncData()" class="w-full border-none rounded-lg bg-surface">
                </div>
            </div>
            <div class="p-4 bg-primary-container/20 rounded-xl text-center">
                <p class="text-xs font-bold opacity-60 uppercase">Всего за день</p>
                <p class="text-4xl font-black text-primary" id="ts-total-display">0.0 ч</p>
            </div>
        </div>
    </div>

    <!-- РАЗДЕЛ: ЗАДАЧИ -->
    <div id="section-tasks" class="hidden-section space-y-6">
        <div id="task-calendar-strip" class="flex gap-2 overflow-x-auto no-scrollbar py-2"></div>
        <div class="flex gap-2">
            <input type="text" id="new-task-input" placeholder="Добавить задачу..." class="flex-1 border-none rounded-xl bg-surface-container">
            <button onclick="addNewTask()" class="editorial-gradient text-white w-12 h-12 rounded-xl">+</button>
        </div>
        <ul id="full-task-list" class="space-y-3"></ul>
    </div>

    <!-- РАЗДЕЛ: ЗАМЕТКИ -->
    <div id="section-notes" class="hidden-section">
        <textarea id="main-notes" oninput="syncData()" placeholder="Ваши заметки на сегодня..." class="w-full h-96 border-none rounded-2xl bg-surface-container p-6 focus:ring-primary"></textarea>
    </div>

</main>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#FAF9F9]/80 dark:bg-[#1B1C1C]/80 backdrop-blur-xl rounded-t-2xl shadow-lg flex justify-around items-center px-4 pb-6 pt-3">
    <button id="nav-home" onclick="showSection('home')" class="flex flex-col items-center justify-center p-3 rounded-xl transition-all">
        <span class="material-symbols-outlined">home</span>
        <span class="text-[10px] font-medium uppercase mt-1">Home</span>
    </button>
    <button id="nav-timesheet" onclick="showSection('timesheet')" class="flex flex-col items-center justify-center p-3 rounded-xl transition-all">
        <span class="material-symbols-outlined">timer</span>
        <span class="text-[10px] font-medium uppercase mt-1">Timesheet</span>
    </button>
    <button id="nav-tasks" onclick="showSection('tasks')" class="flex flex-col items-center justify-center p-3 rounded-xl transition-all">
        <span class="material-symbols-outlined">assignment</span>
        <span class="text-[10px] font-medium uppercase mt-1">Tasks</span>
    </button>
    <button id="nav-notes" onclick="showSection('notes')" class="flex flex-col items-center justify-center p-3 rounded-xl transition-all">
        <span class="material-symbols-outlined">description</span>
        <span class="text-[10px] font-medium uppercase mt-1">Notes</span>
    </button>
    <button onclick="refreshFact()" class="flex flex-col items-center justify-center p-3 rounded-xl transition-all">
        <span class="material-symbols-outlined">lightbulb</span>
        <span class="text-[10px] font-medium uppercase mt-1">Facts</span>
    </button>
</nav>

<script>
    let currentDay = new Date().toISOString().split('T')[0];
    let db = JSON.parse(localStorage.getItem('prod_assistant_db')) || {};
    const audio = document.getElementById('alarm-audio');

    // Навигация
    function showSection(id) {
        document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden-section'));
        document.getElementById('section-' + id).classList.remove('hidden-section');
        
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-nav'));
        const activeBtn = document.getElementById('nav-' + id);
        if(activeBtn) activeBtn.classList.add('active-nav');
        
        const titles = { 'home': 'Главная', 'timesheet': 'Табель', 'tasks': 'Задачи', 'notes': 'Заметки' };
        document.getElementById('page-title').innerText = titles[id] || 'Главная';
        
        if(id === 'tasks') initTaskCalendar();
        updateHomeDisplay();
    }

    // Темы
    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
    }

    // Время и Будильники
    function updateClock() {
        const now = new Date();
        document.getElementById('main-clock').innerText = now.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
        
        const today = now.toISOString().split('T')[0];
        const data = db[today];
        if(data) {
            const check = (timeStr) => {
                if(!timeStr) return;
                const [h, m] = timeStr.split(':');
                if(now.getHours() == h && now.getMinutes() == (m - 5) && now.getSeconds() === 0) {
                    audio.play();
                    alert("5 минут до окончания смены!");
                }
            };
            check(data.e1);
            check(data.e2);
        }
    }

    // Синхронизация данных
    function syncData() {
        if(!db[currentDay]) db[currentDay] = { tasks: [], notes: '', s1:'', e1:'', s2:'', e2:'' };
        
        const data = db[currentDay];
        data.s1 = document.getElementById('ts-s1').value;
        data.e1 = document.getElementById('ts-e1').value;
        data.s2 = document.getElementById('ts-s2').value;
        data.e2 = document.getElementById('ts-e2').value;
        data.notes = document.getElementById('main-notes').value;
        
        localStorage.setItem('prod_assistant_db', JSON.stringify(db));
        updateHomeDisplay();
    }

    function updateHomeDisplay() {
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];
        document.getElementById('current-day-name').innerText = now.toLocaleDateString('ru-RU', {weekday: 'long'});
        document.getElementById('current-date-full').innerText = now.toLocaleDateString('ru-RU', {day: 'numeric', month: 'long', year: 'numeric'});

        const data = db[todayStr] || {};
        
        // Расчет часов
        const getM = (t) => t ? parseInt(t.split(':')[0])*60 + parseInt(t.split(':')[1]) : 0;
        let totalM = 0;
        if(data.s1 && data.e1) totalM += (getM(data.e1) - getM(data.s1));
        if(data.s2 && data.e2) totalM += (getM(data.e2) - getM(data.s2));
        
        document.getElementById('ts-total-display').innerText = (totalM / 60).toFixed(1) + ' ч';
        document.getElementById('home-total-hours').innerText = (totalM / 60).toFixed(1) + 'ч';

        // Будильник
        const nextAlarm = data.e2 || data.e1 || '--:--';
        document.getElementById('next-alarm-display').innerText = nextAlarm;

        // Задачи на главной
        const tasks = data.tasks || [];
        const taskBox = document.getElementById('home-tasks-preview');
        if(tasks.length > 0) {
            taskBox.innerHTML = tasks.slice(0, 2).map(t => `<div class="flex justify-between text-sm py-1 border-b border-black/5"><span>${t.text}</span><span>${t.done ? '✅' : '⏳'}</span></div>`).join('');
            const doneCount = tasks.filter(t => t.done).length;
            document.getElementById('home-progress-bar').style.width = (doneCount / tasks.length * 100) + '%';
        }

        // Подгрузка в инпуты табеля
        if(currentDay === todayStr) {
            document.getElementById('ts-s1').value = data.s1 || '';
            document.getElementById('ts-e1').value = data.e1 || '';
            document.getElementById('ts-s2').value = data.s2 || '';
            document.getElementById('ts-e2').value = data.e2 || '';
        }
    }

    // Календарь задач
    function initTaskCalendar() {
        const box = document.getElementById('task-calendar-strip');
        box.innerHTML = '';
        const today = new Date();
        for(let i = -3; i < 10; i++) {
            const d = new Date();
            d.setDate(today.getDate() + i);
            const dStr = d.toISOString().split('T')[0];
            const btn = document.createElement('button');
            btn.className = `flex-shrink-0 w-12 py-3 rounded-xl flex flex-col items-center bg-surface-container ${dStr === currentDay ? 'active-day' : ''}`;
            btn.innerHTML = `<span class="text-[8px] uppercase">${d.toLocaleDateString('ru-RU', {weekday:'short'})}</span><span class="text-sm font-bold">${d.getDate()}</span>`;
            btn.onclick = () => { currentDay = dStr; initTaskCalendar(); loadTasks(); };
            box.appendChild(btn);
        }
        loadTasks();
    }

    function loadTasks() {
        const list = document.getElementById('full-task-list');
        list.innerHTML = '';
        const tasks = (db[currentDay] && db[currentDay].tasks) ? db[currentDay].tasks : [];
        tasks.forEach((t, i) => {
            const li = document.createElement('li');
            li.className = "flex items-center justify-between p-4 bg-surface-container rounded-xl shadow-sm";
            li.innerHTML = `
                <div class="flex items-center gap-3">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${i})" class="rounded-full text-primary border-none bg-surface">
                    <span class="${t.done ? 'line-through opacity-40' : ''}">${t.text}</span>
                </div>
                <button onclick="deleteTask(${i})" class="material-symbols-outlined text-sm opacity-30">delete</button>
            `;
            list.appendChild(li);
        });
        document.getElementById('main-notes').value = (db[currentDay] && db[currentDay].notes) ? db[currentDay].notes : '';
    }

    function addNewTask() {
        const input = document.getElementById('new-task-input');
        if(!input.value) return;
        if(!db[currentDay]) db[currentDay] = { tasks: [], notes: '', s1:'', e1:'', s2:'', e2:'' };
        db[currentDay].tasks.push({ text: input.value, done: false });
        input.value = '';
        syncData();
        loadTasks();
    }

    function toggleTask(i) {
        db[currentDay].tasks[i].done = !db[currentDay].tasks[i].done;
        syncData();
        loadTasks();
    }

    function deleteTask(i) {
        db[currentDay].tasks.splice(i, 1);
        syncData();
        loadTasks();
    }

    // Пресет (из вашего табеля)
    function applyPreset() {
        const day = new Date(currentDay).getDay();
        const p = {
            0: {s1:'07:00', e1:'17:00'}, 1: {s2:'13:59', e2:'21:59'},
            3: {s2:'12:59', e2:'22:59'}, 4: {s1:'07:00', e1:'09:00', s2:'13:59', e2:'23:59'}
        };
        const active = p[day] || {s1:'09:00', e1:'18:00'};
        document.getElementById('ts-s1').value = active.s1 || '';
        document.getElementById('ts-e1').value = active.e1 || '';
        document.getElementById('ts-s2').value = active.s2 || '';
        document.getElementById('ts-e2').value = active.e2 || '';
        syncData();
    }

    // Факты
    const facts = ["Мозг — самый жирный орган в теле (60% жира).", "Смех улучшает кровоток на 22%.", "Чтение 6 минут снижает стресс на 68%.", "Пчёлы могут считать до 4-х."];
    function refreshFact() {
        document.getElementById('fact-text').innerText = facts[Math.floor(Math.random()*facts.length)];
    }

    window.onload = () => {
        showSection('home');
        setInterval(updateClock, 1000);
        refreshFact();
    };
</script>
</body>
</html>
