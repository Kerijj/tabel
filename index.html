<!DOCTYPE html>
<html class="light" lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Productivity Assistant Pro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7b5455",
                        "primary-light": "#ecbaba",
                        "surface": "#faf9f9",
                        "surface-dark": "#0d0e0e",
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; }
        .hidden-section { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-nav { background-color: #ecbaba !important; color: #1b1c1c !important; border-radius: 20px; }
        .active-day { background-color: #7b5455 !important; color: white !important; }
        .dot-day { background-color: #7b5455; }
        .dot-late { background-color: #ba1a1a; }
        body { transition: background 0.3s; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        .calendar-day-btn { aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; font-size: 0.75rem; }
    </style>
</head>
<body class="bg-surface dark:bg-surface-dark text-slate-900 dark:text-gray-100">

<audio id="alarm-audio" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto" loop></audio>

<header class="fixed top-0 w-full z-50 bg-white/90 dark:bg-zinc-950/90 backdrop-blur-md border-b dark:border-white/5 px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary">event_available</span>
        <h1 id="header-title" class="text-xs font-black uppercase tracking-widest">Главная</h1>
    </div>
    <div class="flex items-center gap-3">
        <button onclick="unlockAudio()" id="audio-btn" class="bg-primary/10 text-primary text-[9px] font-bold px-2 py-1 rounded-full">🔔 ВКЛ ЗВУК</button>
        <button onclick="toggleTheme()" class="material-symbols-outlined opacity-50 text-xl">contrast</button>
        <div id="top-clock" class="font-mono font-bold text-[10px] text-primary">00:00:00</div>
    </div>
</header>

<main class="pt-20 pb-36 px-6 max-w-2xl mx-auto space-y-8">

    <!-- HOME SECTION -->
    <div id="section-home" class="space-y-6">
        <section class="rounded-[2.5rem] bg-white dark:bg-zinc-900 p-8 shadow-xl border dark:border-white/5 relative overflow-hidden">
            <p id="home-date" class="text-[10px] font-bold opacity-40 uppercase tracking-widest mb-2">Дата...</p>
            <h2 id="home-clock" class="text-6xl font-black tracking-tighter text-primary dark:text-primary-light mb-6">00:00</h2>
            <div class="grid grid-cols-2 gap-4 border-t dark:border-white/10 pt-6">
                <div><p class="text-[10px] font-bold opacity-40 uppercase">Сегодня</p><p id="home-hours" class="text-3xl font-black">0.0 ч</p></div>
                <div class="text-right"><p class="text-[10px] font-bold opacity-40 uppercase">Сигнал</p><p id="home-alarm" class="text-xl font-bold text-primary">--:--</p></div>
            </div>
        </section>

        <!-- Календарь -->
        <section class="bg-white dark:bg-zinc-900 p-6 rounded-[2rem] shadow-sm border dark:border-white/5">
            <h3 class="text-[10px] font-black uppercase opacity-40 mb-4 text-center tracking-widest">Календарь (Вс-Сб)</h3>
            <div id="month-grid" class="grid grid-cols-7 gap-2"></div>
        </section>

        <!-- Обзор дня -->
        <div id="day-preview-card" class="hidden bg-white dark:bg-zinc-800 border-2 border-primary/20 p-6 rounded-[2.5rem] space-y-4 shadow-2xl">
            <div class="flex justify-between items-center">
                <h4 id="preview-date-title" class="font-black text-primary uppercase text-sm">24 Октября</h4>
                <button onclick="clearDayData()" class="text-[9px] bg-gray-200 dark:bg-zinc-700 px-3 py-1 rounded-full font-bold uppercase opacity-60">Очистить всё</button>
            </div>
            
            <div id="preview-shifts" class="bg-primary/5 p-4 rounded-2xl text-xs font-bold text-primary flex justify-between">
                <!-- Смены здесь -->
            </div>

            <!-- Добавление задач прямо в превью -->
            <div class="space-y-3">
                <p class="text-[10px] font-bold opacity-40 uppercase">Задачи на этот день:</p>
                <div id="preview-task-list" class="space-y-2 max-h-32 overflow-y-auto no-scrollbar"></div>
                <div class="flex gap-2">
                    <input type="text" id="quick-task-input" placeholder="Новая задача..." class="flex-1 bg-surface dark:bg-zinc-900 border-none rounded-xl text-xs p-3">
                    <button onclick="addQuickTask()" class="bg-primary text-white px-4 rounded-xl font-bold">+</button>
                </div>
            </div>
            <button onclick="showSection('timesheet')" class="w-full py-3 bg-primary text-white rounded-2xl text-[10px] font-bold uppercase shadow-lg">Редактировать смены</button>
        </div>
    </div>

    <!-- TIMESHEET SECTION -->
    <div id="section-timesheet" class="hidden-section space-y-6">
        <div class="bg-white dark:bg-zinc-900 p-6 rounded-[2.5rem] shadow-lg space-y-6 border-2 border-primary/10">
            <div class="flex justify-between items-center">
                <input type="date" id="ts-date-picker" onchange="changeDate(this.value)" class="bg-primary/10 border-none rounded-xl font-bold text-primary text-sm">
                <span id="ts-total" class="text-2xl font-black text-primary">0.0 ч</span>
            </div>

            <div class="space-y-4">
                <div class="p-5 rounded-3xl border-2 border-primary bg-primary/5 space-y-4">
                    <p class="text-[10px] font-black text-primary uppercase text-center tracking-widest">Первая смена (Утро)</p>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="time" id="ts-s1" onchange="saveData()" class="bg-white dark:bg-zinc-800 border-none rounded-2xl p-3 text-center font-bold">
                        <input type="time" id="ts-e1" onchange="saveData()" class="bg-white dark:bg-zinc-800 border-none rounded-2xl p-3 text-center font-bold">
                    </div>
                </div>
                <div class="p-5 rounded-3xl border-2 border-primary bg-primary/5 space-y-4">
                    <p class="text-[10px] font-black text-primary uppercase text-center tracking-widest">Вторая смена (Вечер)</p>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="time" id="ts-s2" onchange="saveData()" class="bg-white dark:bg-zinc-800 border-none rounded-2xl p-3 text-center font-bold">
                        <input type="time" id="ts-e2" onchange="saveData()" class="bg-white dark:bg-zinc-800 border-none rounded-2xl p-3 text-center font-bold">
                    </div>
                </div>
            </div>

            <div class="relative">
                <input type="file" id="ocr-upload" accept="image/*" class="hidden" onchange="processImage(this)">
                <button onclick="document.getElementById('ocr-upload').click()" class="w-full py-5 bg-primary text-white rounded-3xl font-bold text-xs flex items-center justify-center gap-3">
                    <span class="material-symbols-outlined">add_a_photo</span> ЗАГРУЗИТЬ ФОТО ТАБЕЛЯ
                </button>
                <div id="ocr-loader" class="hidden absolute inset-0 bg-white/90 dark:bg-zinc-950/90 flex flex-col items-center justify-center rounded-3xl z-10">
                    <div class="w-10 h-10 border-4 border-primary border-t-transparent rounded-full animate-spin mb-3"></div>
                    <span class="font-black text-[9px] uppercase">Обработка табеля...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- TASKS SECTION -->
    <div id="section-tasks" class="hidden-section space-y-6">
        <div id="calendar-strip" class="flex gap-3 overflow-x-auto no-scrollbar py-2 px-1"></div>
        <div class="bg-white dark:bg-zinc-900 p-6 rounded-[2rem] shadow-sm space-y-4 border dark:border-white/5">
            <input type="text" id="task-input" placeholder="Что сделать?" class="w-full rounded-2xl border-none bg-surface dark:bg-zinc-800 p-4">
            <div class="flex items-center justify-between">
                <select id="task-priority" class="bg-primary/10 border-none rounded-xl text-xs font-bold text-primary p-2">
                    <option value="🚨 Срочно">🚨 Срочно</option>
                    <option value="⏳ Ждет">⏳ Ждет</option>
                    <option value="☕ Обычное">☕ Обычное</option>
                </select>
                <button onclick="addTask()" class="bg-primary text-white px-8 py-3 rounded-2xl font-bold shadow-lg">ДОБАВИТЬ</button>
            </div>
        </div>
        <ul id="task-list" class="space-y-3"></ul>
    </div>

    <!-- NOTES SECTION -->
    <div id="section-notes" class="hidden-section space-y-6">
        <div class="flex gap-2">
            <input type="text" id="note-title" placeholder="Заголовок..." class="flex-1 rounded-2xl border-none bg-white dark:bg-zinc-900 p-4 shadow-sm">
            <button onclick="addNote()" class="bg-primary text-white px-6 rounded-2xl font-bold">OK</button>
        </div>
        <div id="notes-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
    </div>

</main>

<nav class="fixed bottom-0 left-0 w-full h-24 bg-white/95 dark:bg-zinc-950/95 backdrop-blur-xl flex justify-around items-center px-6 border-t dark:border-white/5 z-50 pb-6">
    <button onclick="showSection('home')" id="nav-home" class="flex flex-col items-center p-4 opacity-30"><span class="material-symbols-outlined">home</span></button>
    <button onclick="showSection('timesheet')" id="nav-timesheet" class="flex flex-col items-center p-4 opacity-30"><span class="material-symbols-outlined">assignment</span></button>
    <button onclick="showSection('tasks')" id="nav-tasks" class="flex flex-col items-center p-4 opacity-30"><span class="material-symbols-outlined">checklist</span></button>
    <button onclick="showSection('notes')" id="nav-notes" class="flex flex-col items-center p-4 opacity-30"><span class="material-symbols-outlined">description</span></button>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('prod_v7_db')) || {};
    let selectedDate = new Date().toISOString().split('T')[0];
    const audio = document.getElementById('alarm-audio');
    let alarmPlayedToday = { e1: false, e2: false };

    function unlockAudio() {
        audio.play().then(() => {
            audio.pause(); audio.currentTime = 0;
            document.getElementById('audio-btn').innerText = "✅ ЗВУК: ОК";
            document.getElementById('audio-btn').className = "bg-green-500 text-white text-[9px] font-bold px-2 py-1 rounded-full";
        });
    }

    function showSection(id) {
        document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden-section'));
        document.getElementById('section-' + id).classList.remove('hidden-section');
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-nav', 'opacity-100'));
        document.getElementById('nav-' + id).classList.add('active-nav', 'opacity-100');
        document.getElementById('header-title').innerText = id.toUpperCase();
        if(id === 'home') renderMonthCalendar();
        if(id === 'tasks') { checkTaskRollover(); renderCalendarStrip(); }
        if(id === 'notes') renderNotes();
        if(id === 'timesheet') document.getElementById('ts-date-picker').value = selectedDate;
        loadDayData();
    }

    // --- УЛУЧШЕННЫЙ OCR ДЛЯ ВАШЕГО ТАБЕЛЯ ---
    async function processImage(input) {
        if (!input.files?.[0]) return;
        const loader = document.getElementById('ocr-loader');
        loader.classList.remove('hidden');
        try {
            const result = await Tesseract.recognize(input.files[0], 'eng+heb');
            const lines = result.data.text.split('\n');
            let foundTimes = [];
            
            lines.forEach(line => {
                // Ищем форматы 13:59 ИЛИ просто одиночные числа 7, 9, 17, 12
                const matches = line.match(/\b([0-2]?\d:[0-5]\d)\b|\b([0-2]?\d)\b/g);
                if (matches) {
                    matches.forEach(m => {
                        if (m.includes(':')) {
                            foundTimes.push(m.padStart(5, '0'));
                        } else {
                            // Если просто число 7 или 17, превращаем в 07:00
                            let h = parseInt(m);
                            if (h >= 0 && h <= 24) foundTimes.push(h.toString().padStart(2, '0') + ":00");
                        }
                    });
                }
            });

            if (foundTimes.length >= 2) {
                document.getElementById('ts-s1').value = foundTimes[0];
                document.getElementById('ts-e1').value = foundTimes[1];
                if (foundTimes[foundTimes.length - 2] && foundTimes.length > 2) {
                    document.getElementById('ts-s2').value = foundTimes[foundTimes.length - 2];
                    document.getElementById('ts-e2').value = foundTimes[foundTimes.length - 1];
                }
                saveData();
                alert("Время распознано!");
            } else {
                alert("Время не найдено. Попробуйте более четкое фото.");
            }
        } catch (e) { alert("Ошибка анализа!"); }
        loader.classList.add('hidden');
    }

    // --- КАЛЕНДАРЬ С ВОСКРЕСЕНЬЯ ---
    function renderMonthCalendar() {
        const grid = document.getElementById('month-grid');
        grid.innerHTML = '';
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        const firstDay = new Date(year, month, 1).getDay(); // Вс = 0
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        const headers = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
        headers.forEach(h => grid.innerHTML += `<div class="text-[9px] font-bold opacity-30">${h}</div>`);

        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;

        for(let i=1; i<=daysInMonth; i++) {
            const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const isToday = ds === new Date().toISOString().split('T')[0];
            const d = db[ds] || {};
            let dot = "";
            const lastExit = d.e2 || d.e1;
            if(lastExit) dot = `<div class="w-1 h-1 rounded-full mt-1 ${parseInt(lastExit) < 17 ? 'dot-day' : 'dot-late'}"></div>`;

            const btn = document.createElement('button');
            btn.className = `calendar-day-btn border dark:border-white/5 ${isToday ? 'bg-primary text-white font-bold' : 'bg-white dark:bg-zinc-800'}`;
            btn.innerHTML = `<span>${i}</span>${dot}`;
            btn.onclick = () => showDayPreview(ds);
            grid.appendChild(btn);
        }
    }

    function showDayPreview(ds) {
        selectedDate = ds;
        const card = document.getElementById('day-preview-card');
        document.getElementById('preview-date-title').innerText = new Date(ds).toLocaleDateString('ru-RU', {day:'numeric', month:'long'});
        card.classList.remove('hidden');
        renderDayPreviewContent();
    }

    function renderDayPreviewContent() {
        const d = db[selectedDate] || { s1:'', e1:'', s2:'', e2:'', tasks:[] };
        document.getElementById('preview-shifts').innerHTML = `
            <div>🌅 ${d.s1 || '--'} - ${d.e1 || '--'}</div>
            <div>🌙 ${d.s2 || '--'} - ${d.e2 || '--'}</div>
        `;
        const taskBox = document.getElementById('preview-task-list');
        taskBox.innerHTML = (d.tasks || []).map((t, i) => `
            <div class="flex items-center gap-2 bg-black/5 p-2 rounded-lg">
                <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${i})" class="rounded-full text-primary focus:ring-0 w-4 h-4">
                <span class="${t.done ? 'line-through opacity-40' : ''}">${t.text}</span>
            </div>
        `).join('') || "<p class='opacity-40 text-center py-2'>Нет задач</p>";
    }

    function addQuickTask() {
        const input = document.getElementById('quick-task-input');
        if(!input.value.trim()) return;
        if(!db[selectedDate]) db[selectedDate] = { tasks: [] };
        db[selectedDate].tasks.push({ text: input.value, priority: '☕ Обычное', done: false });
        input.value = '';
        saveData();
        renderDayPreviewContent();
    }

    function clearDayData() {
        if(confirm("Очистить все данные за этот день?")) {
            delete db[selectedDate];
            saveData();
            renderMonthCalendar();
            document.getElementById('day-preview-card').classList.add('hidden');
        }
    }

    // --- СИСТЕМНЫЕ ФУНКЦИИ ---
    function changeDate(v) { selectedDate = v; loadDayData(); }
    function saveData() {
        if(!db[selectedDate]) db[selectedDate] = { tasks: [], s1:'', e1:'', s2:'', e2:'' };
        const d = db[selectedDate];
        d.s1 = document.getElementById('ts-s1')?.value || d.s1;
        d.e1 = document.getElementById('ts-e1')?.value || d.e1;
        d.s2 = document.getElementById('ts-s2')?.value || d.s2;
        d.e2 = document.getElementById('ts-e2')?.value || d.e2;
        localStorage.setItem('prod_v7_db', JSON.stringify(db));
        updateDashboard();
    }

    function loadDayData() {
        const d = db[selectedDate] || { s1:'', e1:'', s2:'', e2:'', tasks:[] };
        if(document.getElementById('ts-s1')) {
            document.getElementById('ts-s1').value = d.s1 || '';
            document.getElementById('ts-e1').value = d.e1 || '';
            document.getElementById('ts-s2').value = d.s2 || '';
            document.getElementById('ts-e2').value = d.e2 || '';
        }
        updateDashboard();
        renderTasks();
    }

    function updateDashboard() {
        const today = new Date().toISOString().split('T')[0];
        const d = db[today] || {};
        const getM = (t) => t ? parseInt(t.split(':')[0])*60 + parseInt(t.split(':')[1]) : 0;
        let total = 0;
        if(d.s1 && d.e1) total += (getM(d.e1) - getM(d.s1));
        if(d.s2 && d.e2) total += (getM(d.e2) - getM(d.s2));
        const h = (total/60).toFixed(1);
        if(document.getElementById('ts-total')) document.getElementById('ts-total').innerText = h + ' ч';
        if(document.getElementById('home-hours')) document.getElementById('home-hours').innerText = h;
        
        const curM = new Date().getHours()*60 + new Date().getMinutes();
        let next = "--:--";
        if(getM(d.e1) > curM) next = d.e1; else if(getM(d.e2) > curM) next = d.e2;
        if(document.getElementById('home-alarm')) document.getElementById('home-alarm').innerText = next;
    }

    function addTask() {
        const input = document.getElementById('task-input');
        const prio = document.getElementById('task-priority').value;
        if(!input.value.trim()) return;
        if(!db[selectedDate]) db[selectedDate] = { tasks: [] };
        db[selectedDate].tasks.push({ text: input.value, priority: prio, done: false });
        input.value = ''; saveData(); renderTasks();
    }

    function renderTasks() {
        const list = document.getElementById('task-list');
        if(!list) return;
        list.innerHTML = (db[selectedDate]?.tasks || []).map((t, i) => `
            <li class="flex items-center justify-between p-5 bg-white dark:bg-zinc-900 rounded-3xl shadow-sm border dark:border-white/5">
                <div class="flex items-center gap-4">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${i})" class="w-6 h-6 rounded-full border-primary text-primary focus:ring-0 bg-transparent">
                    <div>
                        <span class="text-[8px] uppercase font-bold text-primary opacity-50">${t.priority}</span>
                        <p class="text-sm ${t.done ? 'line-through opacity-30' : 'font-bold'}">${t.text}</p>
                    </div>
                </div>
                <button onclick="deleteTask(${i})" class="material-symbols-outlined opacity-20">delete</button>
            </li>
        `).join('');
    }

    function toggleTask(i) { db[selectedDate].tasks[i].done = !db[selectedDate].tasks[i].done; saveData(); renderTasks(); renderDayPreviewContent(); }
    function deleteTask(i) { db[selectedDate].tasks.splice(i,1); saveData(); renderTasks(); renderDayPreviewContent(); }

    function checkTaskRollover() {
        const today = new Date().toISOString().split('T')[0];
        Object.keys(db).forEach(date => {
            if(date < today && db[date].tasks) {
                db[date].tasks.forEach(t => {
                    if(!t.done && !t.rolled) {
                        if(!db[today]) db[today] = { tasks: [] };
                        db[today].tasks.push({ ...t, text: t.text + " (Прошлый день)" });
                        t.rolled = true;
                    }
                });
            }
        });
        saveData();
    }

    function addNote() {
        const title = document.getElementById('note-title');
        if(!title.value.trim()) return;
        if(!db[selectedDate]) db[selectedDate] = { notes_list: [] };
        if(!db[selectedDate].notes_list) db[selectedDate].notes_list = [];
        db[selectedDate].notes_list.push({ title: title.value, content: '', color: '#fffbeb' });
        title.value = ''; saveData(); renderNotes();
    }

    function renderNotes() {
        const grid = document.getElementById('notes-grid');
        if(!grid) return;
        grid.innerHTML = (db[selectedDate]?.notes_list || []).map((n, i) => `
            <div class="p-5 rounded-[2rem] bg-amber-50 dark:bg-zinc-800 shadow-sm space-y-3 border dark:border-white/10">
                <div class="flex justify-between items-center"><h4 class="font-black text-xs">${n.title}</h4><button onclick="deleteNote(${i})" class="opacity-20">×</button></div>
                <textarea onchange="updateNote(${i}, this.value)" class="w-full bg-transparent border-none p-0 text-xs focus:ring-0 h-20" placeholder="Текст...">${n.content || ''}</textarea>
            </div>
        `).join('');
    }

    function updateNote(i, v) { db[selectedDate].notes_list[i].content = v; saveData(); }
    function deleteNote(i) { db[selectedDate].notes_list.splice(i,1); saveData(); renderNotes(); }

    function toggleTheme() { document.documentElement.classList.toggle('dark'); }

    function updateClock() {
        const now = new Date();
        const tStr = now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
        if(document.getElementById('home-clock')) document.getElementById('home-clock').innerText = tStr;
        document.getElementById('top-clock').innerText = now.toLocaleTimeString('ru-RU');
        document.getElementById('home-date').innerText = now.toLocaleDateString('ru-RU', {weekday:'long', day:'numeric', month:'long'});
        if (now.getSeconds() === 0) checkAlarms(now);
    }

    function checkAlarms(now) {
        const d = db[now.toISOString().split('T')[0]];
        if (!d) return;
        const cur = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        const check = (end, type) => {
            if (!end) return;
            const [h, m] = end.split(':');
            let total = parseInt(h)*60 + parseInt(m) - 5;
            let target = Math.floor(total/60).toString().padStart(2,'0') + ":" + (total%60).toString().padStart(2,'0');
            if (cur === target) { audio.play(); alert(`🔔 Смена скоро закончится! (Выход в ${end})`); }
        };
        check(d.e1, 'e1'); check(d.e2, 'e2');
    }

    function renderCalendarStrip() {
        const box = document.getElementById('calendar-strip');
        if(!box) return; box.innerHTML = '';
        const today = new Date();
        const start = new Date();
        start.setDate(today.getDate() - today.getDay()); // Начинаем с Вс
        for(let i = 0; i < 14; i++) {
            const d = new Date(start); d.setDate(start.getDate() + i);
            const dStr = d.toISOString().split('T')[0];
            const btn = document.createElement('button');
            btn.className = `flex-shrink-0 w-14 py-5 rounded-3xl flex flex-col items-center bg-white dark:bg-zinc-900 shadow-sm transition-all ${dStr === selectedDate ? 'active-day scale-110 shadow-lg' : 'opacity-40'}`;
            btn.innerHTML = `<span class="text-[8px] font-black uppercase mb-1">${d.toLocaleDateString('ru-RU',{weekday:'short'})}</span><span class="text-base font-black">${d.getDate()}</span>`;
            btn.onclick = () => { selectedDate = dStr; renderCalendarStrip(); loadDayData(); };
            box.appendChild(btn);
        }
    }

    window.onload = () => {
        showSection('home');
        setInterval(updateClock, 1000);
    };
</script>
</body>
</html>
